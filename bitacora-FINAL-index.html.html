                    <div key={a} style={{padding:"11px 14px",borderRadius:12,border:"2px solid "+(sel2&&sel2!=="auto"?"#8DC63F":"#e2e8f0"),background:sel2&&sel2!=="auto"?"#f2f8e6":"#f8fafc"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                        <div style={{width:30,height:30,borderRadius:8,background:AVATAR_BG[ai%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{a}</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>{sel2&&sel2!=="auto"&&sel2!=="libre"?"Turno: "+sel2:sel2==="libre"?"Libre toda la semana":"Sin cambio"}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        <button onClick={function(){setWeekRole(a,"auto");}} style={{padding:"4px 10px",borderRadius:20,border:"1.5px solid #e2e8f0",background:(!sel2||sel2==="auto")?"#eef6d5":"transparent",color:(!sel2||sel2==="auto")?"#3d6b10":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>Auto</button>
                        <button onClick={function(){setWeekRole(a,"libre");}} style={{padding:"4px 10px",borderRadius:20,border:"1.5px solid #e2e8f0",background:sel2==="libre"?"#fef2f2":"transparent",color:sel2==="libre"?"#ef4444":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>Libre</button>
                        {getRolesRotativos(config).map(function(r){
                          var c=ROLE_COLORS[r]||{};
                          var on=sel2===r;
                          return <button key={r} onClick={function(){setWeekRole(a,r);}} style={{padding:"4px 10px",borderRadius:20,border:"1.5px solid "+(on?c.dot||"#8DC63F":"#e2e8f0"),background:on?c.bg||"#eef6d5":"transparent",color:on?c.text||"#3d6b10":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>{r}</button>;
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
              <button onClick={applyWeek} disabled={!hasWeekChanges} style={{width:"100%",padding:13,borderRadius:11,border:"none",background:!hasWeekChanges?"#e2e8f0":saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:!hasWeekChanges?"#94a3b8":"#fff",fontWeight:700,fontSize:14,cursor:hasWeekChanges?"pointer":"default"}}>
                {saved?"Guardado":!hasWeekChanges?"Seleccióna un turno":"Aplicar semana"}
              </button>
            </div>
          )}

          {viewMode === "dia" && (
            <div>
              <div style={{marginBottom:14,padding:"13px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <input type="date" value={diaFecha} onChange={function(e){setDiaFecha(e.target.value);setStagingDay({});}} style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:14,color:"#1e293b",background:"#fff",outline:"none",fontFamily:"inherit"}}/>
                <div style={{fontSize:13,fontWeight:700,color:"#1a2e0a"}}>{new Date(diaFecha+"T12:00:00").toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"})}</div>
                <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
                  {[[-1,"Ayer"],[0,"Hoy"],[1,"Mañana"]].map(function(item){
                    var f=addDays(today(),item[0]);
                    return <button key={item[0]} onClick={function(){setDiaFecha(f);setStagingDay({});}} style={{padding:"5px 11px",borderRadius:8,border:"1.5px solid "+(f===diaFecha?"#8DC63F":"#e2e8f0"),background:f===diaFecha?"#eef6d5":"#fff",color:f===diaFecha?"#3d6b10":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>{item[1]}</button>;
                  })}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                {ASESORAS.map(function(a,ai) {
                  var over = overrides[diaFecha] && overrides[diaFecha][a];
                  var rolBase = getRolBase(a, diaFecha);
                  var rolFijoD = (!rolBase && config.rolesAsesoras && config.rolesAsesoras[a]) ? config.rolesAsesoras[a] : null;
                  var rolActual = over!==undefined?(over==="libre"?null:over):(rolBase||rolFijoD);
                  var staging = stagingDay[a];
                  var esManual = over!==undefined;
                  var borderColor = staging!==undefined?"#f59e0b":esManual?"#8DC63F":"#e2e8f0";
                  return (
                    <div key={a} style={{padding:"13px 16px",borderRadius:14,border:"2px solid "+borderColor,background:staging!==undefined?"#fffbeb":esManual?"#f2f8e6":"#f8fafc"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <div style={{width:36,height:36,borderRadius:10,background:AVATAR_BG[ai%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:700,color:"#0f172a"}}>{a}</div>
                          <div style={{fontSize:11,color:"#64748b"}}>Base: {rolBase||"libre"}{esManual&&<span style={{marginLeft:6,background:"#eef6d5",color:"#3d6b10",borderRadius:20,fontSize:9,fontWeight:800,padding:"1px 7px"}}>Modificado</span>}</div>
                        </div>
                        {rolActual ? <RolBadge rol={rolActual}/> : <span style={{fontSize:11,color:"#94a3b8"}}>No trabaja</span>}
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        <button onClick={function(){stageRol(a,"auto");}} style={{padding:"5px 11px",borderRadius:20,border:"1.5px solid #e2e8f0",background:!staging&&!esManual?"#eef6d5":"transparent",color:!staging&&!esManual?"#3d6b10":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>Base ({rolBase||"libre"})</button>
                        <button onClick={function(){stageRol(a,"libre");}} style={{padding:"5px 11px",borderRadius:20,border:"1.5px solid #e2e8f0",background:staging==="libre"?"#fef2f2":"transparent",color:staging==="libre"?"#ef4444":"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>No trabaja</button>
                        {getRolesRotativos(config).map(function(r){
                          var c=ROLE_COLORS[r]||{};
                          var on=(staging!==undefined?staging:over)===r;
                          return <button key={r} onClick={function(){stageRol(a,r);}} style={{padding:"5px 11px",borderRadius:20,border:"1.5px solid "+(on?c.dot:"#e2e8f0"),background:on?c.bg:"transparent",color:on?c.text:"#94a3b8",fontSize:11,fontWeight:700,cursor:"pointer"}}>{r}</button>;
                        })}
                      </div>
                      {esManual && staging===undefined && <button onClick={function(){clearDayOverride(diaFecha,a);}} style={{marginTop:8,padding:"3px 10px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>Quitar modificación</button>}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={applyDay} disabled={!hasDayChanges} style={{flex:1,padding:13,borderRadius:11,border:"none",background:!hasDayChanges?"#e2e8f0":saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:!hasDayChanges?"#94a3b8":"#fff",fontWeight:700,fontSize:14,cursor:hasDayChanges?"pointer":"default"}}>
                  {saved?"Guardado":!hasDayChanges?"Sin cambios":"Guardar ajustes del día"}
                </button>
                {overrides[diaFecha] && Object.keys(overrides[diaFecha]).length > 0 && (
                  <button onClick={function(){clearAllDay(diaFecha);}} style={{padding:"13px 16px",borderRadius:11,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:13,cursor:"pointer"}}>Limpiar</button>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ===================== METAS TAB =====================
    function MetasTab(props) {
      var config = props.config;
      var onSave = props.onSave;
      var onConfigChange = props.onConfigChange;
      var saved = props.saved;

      var metasBase = (config.metas && config.metas.default) || {};
      var metasDias = (config.metas && config.metas.dias) || {};
      // Solo roles con ventas activas
      var todosRoles = getRoleKeys(config);
      var rolesConVentasActivos = (config.rolesConVentas && config.rolesConVentas.length > 0)
        ? todosRoles.filter(function(r){ return config.rolesConVentas.indexOf(r) >= 0; })
        : todosRoles;

      var [modo, setModo] = useState("semana");
      var [semana, setSemana] = useState(function(){return getMondayOf(today());});
      var [diaFecha, setDiaFecha] = useState(function(){return today();});
      var [localBase, setLocalBase] = useState(function(){return Object.assign({},metasBase);});
      var [localSemana, setLocalSemana] = useState({});
      var [localDia, setLocalDia] = useState(function(){return Object.assign({},(metasDias[today()]||{}));});

      var diasSemana = getWeekDays(semana);

      useEffect(function(){setLocalDia(Object.assign({},(metasDias[diaFecha]||{})));}, [diaFecha]);

      function saveBase() { onSave(Object.assign({},config.metas||{},{default:localBase})); }
      function applySemana() {
        var newDias = Object.assign({},metasDias);
        diasSemana.forEach(function(f) {
          var merged = Object.assign({},newDias[f]||{});
          getRoleKeys(config).forEach(function(r){if(localSemana[r]!==undefined&&localSemana[r]!=="")merged[r]=localSemana[r];});
          if(Object.keys(merged).length>0)newDias[f]=merged;
        });
        onSave(Object.assign({},config.metas||{},{dias:newDias}));
        setLocalSemana({});
      }
      function saveDia() {
        var newDias = Object.assign({},metasDias);
        var clean = {};
        getRoleKeys(config).forEach(function(r){if(localDia[r]!==undefined&&localDia[r]!=="")clean[r]=localDia[r];});
        if(Object.keys(clean).length>0)newDias[diaFecha]=clean;
        else delete newDias[diaFecha];
        onSave(Object.assign({},config.metas||{},{dias:newDias}));
      }
      function clearDia(f) {
        var newDias=Object.assign({},metasDias);delete newDias[f];
        onSave(Object.assign({},config.metas||{},{dias:newDias}));
        if(f===diaFecha)setLocalDia({});
      }

      var hasWeekChanges = Object.values(localSemana).some(function(v){return v!==undefined&&v!=="";});
      var inp2 = {padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",background:"#f8fafc",outline:"none",fontFamily:"inherit"};
      var modeBtn = function(id,lbl){return <button onClick={function(){setModo(id);}} style={{flex:1,padding:"8px 10px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:modo===id?"#8DC63F":"transparent",color:modo===id?"#fff":"#64748b",fontFamily:"inherit"}}>{lbl}</button>;};

      return (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:20,background:"#f1f5f9",borderRadius:10,padding:4}}>
            {modeBtn("semana","Por semana")}
            {modeBtn("dia","Día individual")}
            {modeBtn("base","Meta base")}
            {modeBtn("roles","Roles con ventas")}
          </div>

          {modo === "semana" && (
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"11px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0"}}>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,-7)));}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700}}>◀</button>
                <div style={{flex:1,textAlign:"center",fontSize:13,fontWeight:800,color:"#1a2e0a"}}>{fmtWeekLabel(semana)}</div>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,7)));}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700}}>▶</button>
              </div>

              <div style={{overflowX:"auto",marginBottom:16}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr>
                      <th style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#64748b",background:"#f8fafc",borderBottom:"1px solid #e2e8f0",minWidth:90}}>Turno</th>
                      {diasSemana.map(function(d,i){
                        var esHoy=d===today();
                        var tieneMeta=metasDias[d]&&Object.keys(metasDias[d]).length>0;
                        return (
                          <th key={d} style={{padding:"6px 4px",textAlign:"center",fontWeight:700,color:esHoy?"#3d6b10":"#64748b",background:esHoy?"#eef6d5":"#f8fafc",borderBottom:"1px solid #e2e8f0",borderLeft:"1px solid #f1f5f9",minWidth:72,position:"relative"}}>
                            {DIAS_ES[i]}<br/>
                            <span style={{fontWeight:400,fontSize:10}}>{new Date(d+"T12:00:00").getDate()}</span>
                            {tieneMeta && <div style={{width:5,height:5,background:"#8DC63F",borderRadius:"50%",margin:"2px auto 0"}}/>}
                            {tieneMeta && <button onClick={function(){clearDia(d);}} style={{position:"absolute",top:2,right:2,width:13,height:13,borderRadius:"50%",border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:9,cursor:"pointer",lineHeight:1,padding:0}}>x</button>}
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {rolesConVentasActivos.map(function(r){
                      return (
                        <tr key={r} style={{borderBottom:"1px solid #f1f5f9"}}>
                          <td style={{padding:"7px 10px"}}><RolBadge rol={r}/></td>
                          {diasSemana.map(function(d,i){
                            var meta=getMetaEfectiva(config,d,r);
                            var esCustom=!!(metasDias[d]&&metasDias[d][r]);
                            return (
                              <td key={d} style={{padding:"5px 4px",textAlign:"center",background:"#fff",borderLeft:"1px solid #f1f5f9"}}>
                                {meta?<span style={{fontSize:10,fontWeight:700,color:esCustom?"#3d6b10":"#94a3b8",background:esCustom?"#eef6d5":"transparent",borderRadius:20,padding:"1px 5px"}}>{(Number(meta)/1000).toFixed(0)}k</span>:<span style={{fontSize:10,color:"#e2e8f0"}}>-</span>}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <div style={{padding:"14px 16px",borderRadius:12,border:"2px dashed #d4edaa",background:"#f9fef0",marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:800,color:"#3d6b10",marginBottom:12}}>APLICAR A TODA LA SEMANA</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {rolesConVentasActivos.map(function(r){
                    var val=localSemana[r]||"";
                    return (
                      <div key={r} style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{minWidth:110}}><RolBadge rol={r}/></div>
                        <input type="number" value={val} onChange={function(e){setLocalSemana(function(s){var n=Object.assign({},s);n[r]=e.target.value;return n;});}} placeholder={"Base: "+(metasBase[r]?Number(metasBase[r]).toLocaleString("es-CO"):"sin meta")} style={Object.assign({},inp2,{flex:1,textAlign:"right",fontWeight:700,fontSize:14,borderColor:val?"#8DC63F":"#e2e8f0"})}/>
                        <span style={{fontSize:11,color:"#94a3b8",flexShrink:0}}>COP</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <button onClick={applySemana} disabled={!hasWeekChanges} style={{width:"100%",padding:12,borderRadius:11,border:"none",background:!hasWeekChanges?"#e2e8f0":saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:!hasWeekChanges?"#94a3b8":"#fff",fontWeight:700,fontSize:14,cursor:hasWeekChanges?"pointer":"default"}}>
                {saved?"Aplicado":!hasWeekChanges?"Ingresa una meta":"Aplicar a la semana"}
              </button>
            </div>
          )}

          {modo === "dia" && (
            <div>
              <div style={{marginBottom:14,padding:"13px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <input type="date" value={diaFecha} onChange={function(e){setDiaFecha(e.target.value);}} style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:14,color:"#1e293b",background:"#fff",outline:"none",fontFamily:"inherit"}}/>
                <div style={{flex:1,fontSize:13,fontWeight:700,color:"#1a2e0a"}}>{new Date(diaFecha+"T12:00:00").toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long"})}</div>
                {metasDias[diaFecha] && <span style={{fontSize:11,background:"#eef6d5",color:"#3d6b10",borderRadius:20,padding:"1px 8px",fontWeight:700}}>Metas personalizadas</span>}
                <div style={{display:"flex",gap:5}}>
                  {[[-1,"Ayer"],[0,"Hoy"],[1,"Mañana"]].map(function(item){
                    var f=addDays(today(),item[0]);
                    return <button key={item[0]} onClick={function(){setDiaFecha(f);}} style={{padding:"5px 11px",borderRadius:8,border:"1.5px solid "+(f===diaFecha?"#8DC63F":"#e2e8f0"),background:f===diaFecha?"#eef6d5":"#fff",color:f===diaFecha?"#3d6b10":"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>{item[1]}</button>;
                  })}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                {rolesConVentasActivos.map(function(r){
                  var base=metasBase[r]||null;
                  var val=localDia[r]||"";
                  return (
                    <div key={r} style={{padding:"12px 16px",background:"#f8fafc",borderRadius:12,border:"1.5px solid "+(val?"#8DC63F":"#e2e8f0")}}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <RolBadge rol={r}/>
                        <div style={{flex:1}}/>
                        <input type="number" value={val} onChange={function(e){setLocalDia(function(m){var n=Object.assign({},m);n[r]=e.target.value;return n;});}} placeholder={base?"Base: "+Number(base).toLocaleString("es-CO"):"Sin meta base"} style={Object.assign({},inp2,{width:160,textAlign:"right",fontWeight:700,fontSize:15,borderColor:val?"#8DC63F":"#e2e8f0"})}/>
                        <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>COP</span>
                      </div>
                      {base && <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>Base: {Number(base).toLocaleString("es-CO")} COP</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={saveDia} style={{flex:1,padding:12,borderRadius:11,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                  {saved?"Guardado":"Guardar metas del día"}
                </button>
                {metasDias[diaFecha] && <button onClick={function(){clearDia(diaFecha);}} style={{padding:"12px 16px",borderRadius:11,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:13,cursor:"pointer"}}>Borrar</button>}
              </div>
            </div>
          )}

          {modo === "base" && (
            <div>
              <p style={{fontSize:12,color:"#94a3b8",marginTop:0,marginBottom:14}}>Meta de respaldo cuando no hay meta específica para el día.</p>
              <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
                {rolesConVentasActivos.map(function(r){
                  return (
                    <div key={r} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0"}}>
                      <RolBadge rol={r}/>
                      <div style={{flex:1}}/>
                      <input type="number" value={localBase[r]||""} onChange={function(e){setLocalBase(function(m){var n=Object.assign({},m);n[r]=e.target.value;return n;});}} placeholder="0" style={Object.assign({},inp2,{width:150,textAlign:"right",fontWeight:700,fontSize:15})}/>
                      <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>COP</span>
                    </div>
                  );
                })}
              </div>
              <button onClick={saveBase} style={{width:"100%",padding:12,borderRadius:11,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                {saved?"Guardado":"Guardar meta base"}
              </button>
            </div>
          )}

          {modo === "roles" && (
            <div>
              <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:14}}>
                Activa el Bloque 2 (Meta de ventas) solo para los roles que lo necesiten. Los roles desactivados no verán ese bloque.
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {getRoleKeys(config).map(function(rol){
                  var rolesConVentas = config.rolesConVentas;
                  // Si no hay config, todos activos por defecto
                  var activo = !rolesConVentas || rolesConVentas.length === 0 || rolesConVentas.indexOf(rol) >= 0;
                  var c = getRoleColors(config)[rol] || {};
                  return (
                    <div key={rol} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderRadius:12,
                      border:"1.5px solid "+(activo?(c.dot||"#8DC63F"):"#e2e8f0"),
                      background:activo?(c.bg||"#f0fdf4"):"#f8fafc"}}>
                      <span style={{background:c.bg||"#f1f5f9",color:c.text||"#475569",padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:12,border:"1.5px solid "+(c.dot||"#e2e8f0"),flex:1}}>{rol}</span>
                      <span style={{fontSize:12,color:activo?"#15803d":"#94a3b8",fontWeight:600,minWidth:80,textAlign:"right"}}>
                        {activo?"✓ Con ventas":"Sin ventas"}
                      </span>
                      <button onClick={function(){
                        var base = (config.rolesConVentas && config.rolesConVentas.length > 0)
                          ? config.rolesConVentas.slice()
                          : getRoleKeys(config).slice();
                        var nuevos = base.indexOf(rol) >= 0
                          ? base.filter(function(r){return r!==rol;})
                          : base.concat([rol]);
                        onConfigChange(Object.assign({},config,{rolesConVentas:nuevos}));
                      }} style={{padding:"6px 14px",borderRadius:9,border:"none",fontWeight:700,fontSize:12,cursor:"pointer",
                        background:activo?"#fef2f2":"#eef6d5",
                        color:activo?"#ef4444":"#3d6b10"}}>
                        {activo?"Desactivar":"Activar"}
                      </button>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:"#f0f9ff",border:"1px solid #bae6fd",fontSize:12,color:"#0c4a6e"}}>
                💡 Los cambios se guardan automáticamente.
              </div>
            </div>
          )}

        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // ADMIN TAB: NOVEDADES
    // ═══════════════════════════════════════════════════
    function NovedadesTab(props) {
      var config = props.config;
      var novedades = props.novedades;
      var setNovedades = props.setNovedades;
      var onSave = props.onSave;
      var saved = props.saved;

          {vista === "registrar" && (

                        <input type="number" min="0" value={val} onChange={function(e){setVal(a,e.target.value);}} style={Object.assign({},inp2,{width:70,textAlign:"center",fontWeight:800,fontSize:18,color:"#ef4444",borderColor:Number(val)>0?"#fca5a5":"#e2e8f0"})}/>
                        <button onClick={function(){setVal(a,(Number(val)||0)+1);}} style={{width:28,height:28,borderRadius:7,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>+</button>

              <button onClick={handleSave} style={{width:"100%",padding:12,borderRadius:11,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>

          {vista === "detalle" && (

                {ASESORAS.map(function(a,i){
                  var dets = detallesLocal[a] || [];
                  var abierto = asesoraDetalle === a;
                  return (
                    <div key={a} style={{borderRadius:14,border:"1.5px solid "+(dets.length>0?"#fca5a5":"#e2e8f0"),background:"#fff",overflow:"hidden"}}>
                      <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:dets.length>0?"#fff5f5":"#f8fafc"}}
                        onClick={function(){setAsesoraDetalle(abierto?null:a);}}>
                        <div style={{width:34,height:34,borderRadius:9,background:AVATAR_BG[i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{a}</div>

                      </div>
                      {abierto && (
                        <div style={{padding:"12px 16px",borderTop:"1px solid #f1f5f9"}}>
                          {dets.map(function(d,di){
                            return (
                              <div key={di} style={{padding:"10px 12px",borderRadius:10,background:"#fef2f2",border:"1px solid #fecaca",marginBottom:8,display:"flex",gap:10,alignItems:"flex-start"}}>
                                <div style={{flex:1}}>
                                  <div style={{display:"flex",gap:8,marginBottom:4}}>
                                    <span style={{fontSize:10,fontWeight:800,color:"#ef4444",background:"#fee2e2",borderRadius:20,padding:"1px 8px"}}>#{d.ticket||"S/N"}</span>
                                    <span style={{fontSize:10,color:"#94a3b8"}}>{d.fecha||""}</span>
                                  </div>
                                  <div style={{fontSize:13,color:"#1e293b",fontWeight:600}}>{d.motivo}</div>
                                </div>
                                <button onClick={function(){eliminarDetalle(a,di);}} style={{padding:"3px 8px",borderRadius:6,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>X</button>
                              </div>
                            );
                          })}
                          <div style={{padding:"12px",borderRadius:10,background:"#f8fafc",border:"2px dashed #e2e8f0",marginTop:4}}>
                            <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8}}>+ AGREGAR NOVEDAD</div>
                            <div style={{display:"grid",gridTemplateColumns:"110px 1fr",gap:8,marginBottom:8}}>
                              <input placeholder="Ticket #" value={newTicket} onChange={function(e){setNewTicket(e.target.value);}} style={inp2}/>
                              <input placeholder="Motivo..." value={newMotivo} onChange={function(e){setNewMotivo(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")agregarDetalle(a);}} style={inp2}/>
                            </div>
                            <button onClick={function(){agregarDetalle(a);}} style={{width:"100%",padding:"8px 0",borderRadius:9,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Agregar</button>
                          </div>
                          <button onClick={handleSave} style={{width:"100%",marginTop:8,padding:"9px 0",borderRadius:9,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{saved?"Guardado":"Guardar"}</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── Vista Historial ── */}
          {vista === "historial" && (
            <div>
              <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:16}}>Historial de novedades por asesora.</p>
              {mesesConDatos.length === 0
                ? <div style={{textAlign:"center",color:"#94a3b8",fontSize:14,padding:40}}>Sin historial aun</div>
                : (
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {mesesConDatos.map(function(mk){
                      var partes = mk.split("-");
                      var mIdx = parseInt(partes[1],10)-1;
                      var mAnio = parseInt(partes[0],10);
                      var datos = novedades[mk] || {};
                      var totalK = Object.values(datos).reduce(function(s,v){return s+(Number(v)||0);},0);
                      var esActual = mIdx===now.getMonth()&&mAnio===now.getFullYear();
                      var detsK = (config.novedadesDetalle&&config.novedadesDetalle[mk])||{};
                      return (
                        <div key={mk} style={{borderRadius:14,border:"1.5px solid "+(esActual?"#8DC63F":"#e2e8f0"),background:"#fff",overflow:"hidden"}}>

    // ===================== ROLES TAB =====================
    function RolesTab(props) {
      var config = props.config;
      var onSave = props.onSave;
      var saved = props.saved;
      var allRoles = getRoleKeys(config);
      var [roles, setRoles] = useState(function(){
        if (config.customRoles && config.customRoles.length > 0) return config.customRoles;
        return getRoleKeys(config).map(function(r){
          var c=ROLE_COLORS[r]||{};
          return {nombre:r,bg:c.bg||"#f1f5f9",text:c.text||"#475569",dot:c.dot||"#94a3b8"};
        });
      });
      var [newRol, setNewRol] = useState({nombre:"",bg:"#eef6d5",text:"#3d6b10",dot:"#8DC63F"});
      var [confirmarEliminarRol, setConfirmarEliminarRol] = useState(null);
      var inp2 = {padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",background:"#f8fafc",outline:"none",fontFamily:"inherit"};

      function addRol() {
        if (!newRol.nombre.trim()) return;
        if (roles.find(function(r){return r.nombre===newRol.nombre.trim();})) return;
        var updated = roles.concat([Object.assign({},newRol,{nombre:newRol.nombre.trim()})]);
        setRoles(updated);
        setNewRol({nombre:"",bg:"#eef6d5",text:"#3d6b10",dot:"#8DC63F"});
        onSave(updated);
      }
      function removeRol(nombre) { setConfirmarEliminarRol(nombre); }
      function confirmarRemoveRol() {
        var updated = roles.filter(function(r){return r.nombre!==confirmarEliminarRol;});
        setRoles(updated);
        onSave(updated);
        setConfirmarEliminarRol(null);
      }

      return (
        <div>
          <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:14}}>Crea roles personalizados para usuarios con actividades distintas. Los roles se asignan en Turnos y definen las tareas disponibles.</p>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
            {roles.map(function(r,i){
              return (
                <div key={r.nombre} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:11,border:"1.5px solid "+(r.dot||"#e2e8f0"),background:r.bg||"#f8fafc"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:r.dot||"#94a3b8",flexShrink:0}}></div>
                  <span style={{flex:1,fontSize:13,fontWeight:700,color:r.text||"#1e293b"}}>{r.nombre}</span>
                  <button onClick={function(){removeRol(r.nombre);}} style={{padding:"4px 10px",borderRadius:7,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>Eliminar</button>
                </div>
              );
            })}
          </div>
          {confirmarEliminarRol && (
            <div style={{padding:"16px",borderRadius:12,border:"2px solid #fca5a5",background:"#fef2f2",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:800,color:"#991b1b",marginBottom:8}}>Eliminar rol: <b>{confirmarEliminarRol}</b></div>
              <div style={{fontSize:12,color:"#b91c1c",marginBottom:12}}>Esta acción no se puede deshacer. Las tareas asignadas a este rol se verán afectadas.</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={confirmarRemoveRol} style={{flex:1,padding:"9px 0",borderRadius:9,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Sí, eliminar</button>
                <button onClick={function(){setConfirmarEliminarRol(null);}} style={{flex:1,padding:"9px 0",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              </div>
            </div>
          )}
          <div style={{padding:"16px",borderRadius:12,border:"2px dashed #e2e8f0",background:"#f8fafc",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:10}}>+ NUEVO ROL</div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input placeholder="Nombre del rol" value={newRol.nombre} onChange={function(e){setNewRol(function(x){return Object.assign({},x,{nombre:e.target.value});});}} onKeyDown={function(e){if(e.key==="Enter")addRol();}} style={Object.assign({},inp2,{flex:1})}/>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b"}}>Fondo</label>

              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b"}}>Texto</label>

              </div>

                <label style={{fontSize:11,fontWeight:700,color:"#64748b"}}>Borde</label>

              </div>

                {newRol.nombre||"Vista previa"}
              </div>

          </div>

    // ===================== CONTRASENAS TAB =====================
    function ContrasenasTab(props) {

      var onSave = props.onSave;
      var saved = props.saved;
      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;

      var [local, setLocal] = useState(function(){return Object.assign({},passwords);});
      var [visible, setVisible] = useState({});
      var [editando, setEditando] = useState(null);
      var [nuevaPwd, setNuevaPwd] = useState("");
      var [confirmPwd, setConfirmPwd] = useState("");
      var [errorMsg, setErrorMsg] = useState("");

      function toggleVisible(a) { setVisible(function(v){var n=Object.assign({},v);n[a]=!v[a];return n;}); }
      function abrirEditor(a) { setEditando(a); setNuevaPwd(""); setConfirmPwd(""); setErrorMsg(""); }
      function cerrarEditor() { setEditando(null); setNuevaPwd(""); setConfirmPwd(""); setErrorMsg(""); }

      function guardarPwd(a) {
        if (nuevaPwd.length > 0 && nuevaPwd.length < 4) { setErrorMsg("Mínimo 4 caracteres"); return; }
        if (nuevaPwd !== confirmPwd) { setErrorMsg("Las contraseñas no coinciden"); return; }
        var updated = Object.assign({},local);
        if (nuevaPwd === "") delete updated[a];
        else updated[a] = nuevaPwd;
        setLocal(updated);
        onSave(updated);
        cerrarEditor();

        setLocal(updated);

            <div style={{fontSize:12,color:"#0c4a6e",lineHeight:1.5}}>

              <div style={{width:36,height:36,borderRadius:10,background:"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#fff",fontWeight:800,flexShrink:0}}>A</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>Administrador</div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                  {passwords["__admin__"]
                    ? <span style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontFamily:"monospace",letterSpacing:3,fontWeight:700,color:"#6366f1"}}>{"*".repeat((passwords["__admin__"]||"").length)}</span>
                        <button onClick={function(){abrirEditor("__admin__");}} style={{fontSize:10,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>cambiar</button>
                      </span>
                    : <span>Contraseña por defecto: <b>admin123</b></span>
                  }
                </div>
              </div>
              {editando !== "__admin__" && (
                <div style={{display:"flex",gap:6}}>
                  <button onClick={function(){abrirEditor("__admin__");}} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #c7d2fe",background:"#e0e7ff",color:"#4338ca",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                    {passwords["__admin__"]?"Cambiar":"Personalizar"}
                  </button>
                  {passwords["__admin__"] && <button onClick={function(){quitarPwd("__admin__");}} style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>Quitar</button>}
                </div>
              )}
            </div>
            {editando === "__admin__" && (
              <div style={{padding:"14px 16px",borderTop:"1px solid #c7d2fe",background:"#ede9fe"}}>
                <div style={{fontSize:11,fontWeight:800,color:"#4338ca",marginBottom:10}}>
                  {passwords["__admin__"]?"Cambiar contraseña de Admin":"Nueva contraseña para Admin"}

                <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>Nueva contraseña (mínimo 4 caracteres)</label>
                    <input type="password" value={nuevaPwd} onChange={function(e){setNuevaPwd(e.target.value);setErrorMsg("");}} placeholder="Nueva contraseña..." style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid #c7d2fe",fontSize:13,color:"#1e293b",background:"#fff",outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"}} autoFocus/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>Confirmar contraseña</label>
                    <input type="password" value={confirmPwd} onChange={function(e){setConfirmPwd(e.target.value);setErrorMsg("");}} onKeyDown={function(e){if(e.key==="Enter")guardarPwd("__admin__");}} placeholder="Repetir contraseña..." style={{padding:"9px 12px",borderRadius:9,border:"1.5px solid "+(errorMsg?"#fca5a5":"#c7d2fe"),fontSize:13,color:"#1e293b",background:"#fff",outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"}}/>
                  </div>
                </div>
                {errorMsg && <div style={{fontSize:12,color:"#dc2626",fontWeight:700,marginBottom:8}}>{errorMsg}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={function(){guardarPwd("__admin__");}} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"#6366f1",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    Guardar contraseña
                  </button>
                  <button onClick={cerrarEditor} style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>Cancelar</button>

          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {ASESORAS.map(function(a,i){

              return (
                <div key={a} style={{borderRadius:14,border:"2px solid "+(esEditando?"#f59e0b":tienePwd?"#8DC63F":"#e2e8f0"),background:esEditando?"#fffbeb":tienePwd?"#f2f8e6":"#f8fafc",overflow:"hidden"}}>
                  <div style={{padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:36,height:36,borderRadius:10,background:AVATAR_BG[i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{a}</div>
                      {tienePwd
                        ? <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                            <span style={{fontSize:11,color:visible[a]?"#3d6b10":"#64748b",fontFamily:"monospace",letterSpacing:visible[a]?1:3,fontWeight:700}}>{visible[a]?local[a]:"*".repeat(local[a].length)}</span>
                            <button onClick={function(){toggleVisible(a);}} style={{fontSize:10,color:"#94a3b8",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>{visible[a]?"ocultar":"mostrar"}</button>
