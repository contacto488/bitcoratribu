    function today() {
      // Usar hora local de Colombia (UTC-5) para que la fecha no cambie a medianoche UTC
      var d = new Date();

      var local = new Date(d.getTime() - offset * 60000);

    function initials(n) { return n.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase(); }
    function formatEs(iso) { return new Date(iso + "T12:00:00").toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
    function formatCOP(n) { if (!n && n !== 0) return "-"; return "$" + Number(n).toLocaleString("es-CO"); }
    function pctCheck(checks) {
      // Solo "Si" cuenta como cumplida. "No" y "Tarde" reducen el porcentaje.
      var v = Object.values(checks || {});
      var si = v.filter(function(x){return x==="Si";}).length;
      var tot = v.filter(function(x){return x==="Si"||x==="No"||x==="Tarde";}).length;
      return tot ? Math.round(si / tot * 100) : null;
    }

    function addDays(dateStr, n) {

      d.setDate(d.getDate() + n);

    function calcularDistancia(lat1, lng1, lat2, lng2) {
      var R = 6371000; // metros
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
              Math.sin(dLng/2)*Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function verificarUbicacion(callback) {
      if (!navigator.geolocation) { callback({ok:false, error:"Sin GPS"}); return; }
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var dist = calcularDistancia(pos.coords.latitude, pos.coords.longitude, OFICINA_LAT, OFICINA_LNG);
          callback({
            ok: true,
            enOficina: dist <= OFICINA_RADIO_M,
            distancia: Math.round(dist),
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          });
        },
        function(err) { callback({ok:false, error:err.message}); },
        {timeout:8000, maximumAge:60000}
      );
    }

    function getHorarioForRol(rol, config) {
      var horarios = (config && config.horarios) || HORARIOS_DEFAULT;
      return horarios.find(function(h){ return (h.roles||[]).indexOf(rol) >= 0; }) || null;

    function calcularPuntualidad(horaEntrada, horaEsperada) {
      if (!horaEntrada || !horaEsperada) return "Puntual";
      var partsE = horaEsperada.split(":").map(Number);
      var partsA = horaEntrada.split(":").map(Number);
      var minEsperado = partsE[0]*60 + partsE[1];
      var minActual = partsA[0]*60 + partsA[1];
      var diff = minActual - minEsperado;
      if (diff <= GRACIA_MINUTOS) return "Puntual";
      return "Tarde";
    }

      script.onerror = function(){ try{delete window[cbName];}catch(e){} try{if(script.parentNode)script.parentNode.removeChild(script);}catch(e){} };
      setTimeout(function(){ try{delete window[cbName];}catch(e){} try{if(script.parentNode)script.parentNode.removeChild(script);}catch(e){} }, 8000);
      script.src = SHEETS_URL + "?payload=" + encodeURIComponent(JSON.stringify(payload)) + "&cb=" + cbName;
      document.head.appendChild(script);
    }

    function enviarASheets(entry, config) {
      if (!SHEETS_URL) return Promise.resolve({ok:false,skip:true});
      var tareas = (config.tareas || TAREAS_BASE).filter(function(t){return (t.roles||[]).indexOf(entry.rol||"")>=0;});
      var metricas = config.metricas || METRICAS_BASE;
      var meta = getMetaEfectiva(config, entry.fecha, entry.rol);
      var payload = Object.assign({}, entry, {
        meta: meta,
        tareasDef: tareas.map(function(t){return {code:t.code,nombre:t.nombre};}),
        metricasDef: metricas.map(function(m){return {code:m.code,nombre:m.nombre};})
      });
      return new Promise(function(resolve) {
        var cbName = "_gs_cb_" + Date.now();
        var script = document.createElement("script");
        var resuelto = false;
        function cleanup(result) {
          if (resuelto) return;
          resuelto = true;
          try { delete window[cbName]; } catch(e) {}
          try { if (script.parentNode) script.parentNode.removeChild(script); } catch(e) {}
          resolve(result || {ok:true});
        }
        window[cbName] = function(result) { cleanup(result || {ok:true}); };
        script.onerror = function() { cleanup({ok:true,note:"sent"}); };
        setTimeout(function() { cleanup({ok:true,note:"timeout"}); }, 10000);
        script.src = SHEETS_URL + "?payload=" + encodeURIComponent(JSON.stringify(payload)) + "&cb=" + cbName;
        document.head.appendChild(script);
      });
    }

    // ===================== FORM VIEW =====================
    function FormView(props) {
      var onSave = props.onSave;
      var existingData = props.existingData;
      var config = props.config;
      var defaultAsesora = props.defaultAsesora;
      var isAdmin = props.isAdmin || false;
      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;

      var [asesora, setAsesora] = useState(function(){return defaultAsesora || ASESORAS[0];});
      var [fecha, setFecha] = useState(function(){return today();});
      var [checks, setChecks] = useState({});
      var [ventas, setVentas] = useState("");
      var [metricas, setMetricas] = useState({});
      var [notas, setNotas] = useState("");
      var [saved, setSaved] = useState(false);
      var [showSuccess, setShowSuccess] = useState(false);
      var [reminder, setReminder] = useState(false);
      var [confirmarBorrar, setConfirmarBorrar] = useState(false);
      var [confirmarGuardar, setConfirmarGuardar] = useState(false);
      var [autoSaveStatus, setAutoSaveStatus] = useState(null); // null | "saving" | "saved"
      var autoSaveTimer = React.useRef(null);

      var rol = getRolForDate(asesora, fecha, config.overrides || {}, config);
      var esOverride = !!(config.overrides && config.overrides[fecha] && config.overrides[fecha][asesora] !== undefined);
      // Grupo al que pertenece el rol actual
      var gruposRoles = config.gruposRoles || {
        vendedores: ["Leads T1","Leads T2","Clientes T1","Clientes T2","Leads Sab","Clientes Sab","Hibrido"],
        soporte: ["Servicio al cliente","Lider"]
      };
      var grupoActual = rol
        ? ((gruposRoles.vendedores||[]).indexOf(rol) >= 0 ? "Vendedores"
          : (gruposRoles.soporte||[]).indexOf(rol) >= 0 ? "Soporte" : null)
        : null;
      var prefixGrupo = grupoActual === "Vendedores" ? "A"
        : grupoActual === "Soporte" ? "S" : null;
      // Tareas base del rol
      var tareasBase = (config.tareas || TAREAS_BASE).filter(function(t){return (t.roles||[]).indexOf(rol||"")>=0;});
      // Aplicar configuracion por dia de semana
      var diaSemannaKey = getDiaSemanaKey(fecha);
      var excSemana = (config.tareasSemanales && config.tareasSemanales[diaSemannaKey] && config.tareasSemanales[diaSemannaKey][rol]) || {add:[],remove:[]};
      var tareasQuitadas = excSemana.remove || [];
      var tareasAgregadas = (excSemana.add || []).map(function(code){return (config.tareas||TAREAS_BASE).find(function(t){return t.code===code;});}).filter(Boolean);
      var tareas = tareasBase.filter(function(t){return tareasQuitadas.indexOf(t.code)<0;}).concat(tareasAgregadas);

      // Filtrar tareas por grupo (prefijo de código)
      if (prefixGrupo) {
        tareas = tareas.filter(function(t){
          // Tareas sin código o con prefijo del grupo actual pasan
          if (!t.code) return true;
          return t.code.toUpperCase().startsWith(prefixGrupo);
        });
      }

      // Tareas programadas para esta fecha (fecha específica o día del mes)
      var diaMesFecha = parseInt(fecha.slice(8,10), 10);
      var tareasProgr = (config.tareasProgr || []).filter(function(p){
        if (!rol) return false;
        var rolOk = (p.roles||[]).indexOf(rol) >= 0;
        if (!rolOk) return false;
        if (p.tipo === "fecha") return p.fecha === fecha;
        if (p.tipo === "mensual") return p.diaMes === diaMesFecha;
        return false;
      });
      // Agregar tareas programadas que no estén ya en la lista
      tareasProgr.forEach(function(prog){
        (prog.tareas||[]).forEach(function(code){
          var yaEsta = tareas.find(function(t){return t.code===code;});
          if (!yaEsta) {
            var tarea = (config.tareas||TAREAS_BASE).find(function(t){return t.code===code;});
            // Solo agregar si pertenece al grupo correcto
            if (tarea && (!prefixGrupo || (tarea.code||"").toUpperCase().startsWith(prefixGrupo))) {
              tareas = tareas.concat([Object.assign({},tarea,{_programada:true,_nota:prog.nota})]);
            }
          }
        });
      });
      var metricasList = (config.metricas || METRICAS_BASE).filter(function(m){
        // Si la metrica tiene roles definidos, mostrar solo si el rol actual está incluido
        if (!Array.isArray(m.roles) || m.roles.length === 0) return true; // sin restriccion = todos
        return m.roles.indexOf(rol||"") >= 0;
      });
      var metaDiaria = getMetaEfectiva(config, fecha, rol);
      // Roles que tienen bloque de ventas (por defecto todos excepto los que se excluyan)
      var rolesConVentas = config.rolesConVentas;
      var mostrarVentas = !rolesConVentas || rolesConVentas.length === 0 || (rol && rolesConVentas.indexOf(rol) >= 0);
      var aIdx = ASESORAS.indexOf(asesora);

      useEffect(function(){
        if (defaultAsesora) setAsesora(defaultAsesora);
      }, [defaultAsesora]);

      useEffect(function(){
        var prev = existingData[asesora + "__" + fecha];
        if (prev) { setChecks(prev.checks||{}); setVentas(prev.ventas||""); setMetricas(prev.metricas||{}); setNotas(prev.notas||""); }
        else { setChecks({}); setVentas(""); setMetricas({}); setNotas(""); }
      }, [asesora, fecha, existingData]);

      useEffect(function(){
        var CHECK_MS = 5 * 60 * 1000;
        var LIMIT_MS = 2.5 * 60 * 60 * 1000;
        function checkReminder() {
          var key = asesora + "__" + fecha;
          var lastSaved = localStorage.getItem("bitacora_lastsaved_" + key);
          if (!lastSaved) {
            var now = new Date();
            var startOfShift = new Date(fecha + "T08:00:00");
            if (fecha === today() && now - startOfShift > LIMIT_MS) setReminder(true);
            else setReminder(false);
          } else {
            setReminder(Date.now() - Number(lastSaved) > LIMIT_MS);
          }
        }
        checkReminder();
        var interval = setInterval(checkReminder, CHECK_MS);
        return function(){ clearInterval(interval); };
      }, [asesora, fecha]);

      function toggle(code, val) {
        var nuevos = {};
        setChecks(function(c){var n=Object.assign({},c);n[code]=c[code]===val?"":val;nuevos=n;return n;});
        setTimeout(function(){dispararAutoGuardado(nuevos, ventas, metricas, notas);},0);
      }
      function setMet(code, val) {
        var nuevas = {};
        setMetricas(function(m){var n=Object.assign({},m);n[code]=val;nuevas=n;return n;});
        setTimeout(function(){dispararAutoGuardado(checks, ventas, nuevas, notas);},0);
      }

      // Auto-guardado: guarda progreso sin bloquear, 1.5s después del último cambio
      function dispararAutoGuardado(checksActuales, ventasActuales, metricasActuales, notasActuales) {
        if (!rol || estaBloqueada) return;
        if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
        setAutoSaveStatus("saving");
        autoSaveTimer.current = setTimeout(function() {
          onSave({asesora:asesora, fecha:fecha, rol:rol,
            checks:checksActuales, ventas:ventasActuales,
            metricas:metricasActuales, notas:notasActuales,
            savedAt:new Date().toISOString(), enProgreso:true});
          setAutoSaveStatus("saved");
          setTimeout(function(){setAutoSaveStatus(null);}, 3000);
        }, 1500);
      }

      function handleSave() {
        if (!rol) return;
        setConfirmarGuardar(true);
      }

      function confirmarYGuardar() {
        onSave({asesora:asesora,fecha:fecha,rol:rol,checks:checks,ventas:ventas,metricas:metricas,notas:notas,savedAt:new Date().toISOString()});
        localStorage.setItem("bitacora_lastsaved_" + asesora + "__" + fecha, String(Date.now()));
        // Marcar como bloqueada inmediatamente
        localStorage.setItem("bitacora_locked_" + asesora + "__" + fecha, "1");
        setReminder(false);
        setSaved(true);
        setShowSuccess(true);
        setConfirmarGuardar(false);
        setTimeout(function(){setSaved(false);}, 2500);
        setTimeout(function(){setShowSuccess(false);}, 3000);
      }

        setChecks({}); setVentas(""); setMetricas({}); setNotas("");

                // Geolocalización
                if (geo.ok) {

                enviarAsistenciaASheets(Object.assign({}, nueva, {accion: tipo}));

            var esPuntual = estadoPuntualidad === "Puntual";

                              display:"flex",alignItems:"center",justifyContent:"center"}}>

                                  </span>
                                : <span style={{fontSize:11,color:"#94a3b8"}}>—</span>}

                <div>

                    <div style={{display:"flex",flexDirection:"column",gap:6}}>

                        var v = checks[t.code] || "";
                        var esPuntualidad = t.code === "A001" || t.nombre === "Puntualidad";
                        if (esPuntualidad) {

                              </span>
                              <div style={{display:"flex",gap:5}}>
                                {["Si","No"].map(function(opt){
                                  return (
                                    <button key={opt} onClick={function(){if(!estaBloqueada)toggle(t.code,opt);}} style={{padding:"4px 11px",borderRadius:7,border:"none",cursor:estaBloqueada?"default":"pointer",fontSize:12,fontWeight:700,background:v===opt?(opt==="Si"?"#10b981":"#ef4444"):"#e2e8f0",color:v===opt?"#fff":"#64748b",opacity:estaBloqueada?0.7:1}}>
                                      {opt}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                            {esArqueo && (

                                <span style={{fontSize:11,fontWeight:700,color:"#64748b",whiteSpace:"nowrap"}}>
                                  {t.code==="A006"?"Valor recibido:":"Valor entregado:"}
                                </span>
                                <input
                                  type="number"
                                  min="0"
                                  value={valArqueo}
                                  onChange={function(e){if(!estaBloqueada)setMet("arqueo_"+t.code, e.target.value);}}
                                  disabled={estaBloqueada}
                                  placeholder="0"
                                  style={{flex:1,padding:"6px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,fontWeight:700,color:"#1e293b",background:estaBloqueada?"#f1f5f9":"#fff",outline:"none",fontFamily:"inherit"}}
                                />
                                <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>COP</span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ) : <p style={{color:"#94a3b8",fontSize:13,textAlign:"center"}}>No hay tareas para este turno</p>}
                </div>

                {mostrarVentas && (
                <div>
                  <SectionTitle text="Bloque 2 — Meta de ventas"/>
                  <div style={{padding:"14px 16px",background:"#f8fafc",borderRadius:12,border:"1.5px solid #e2e8f0"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                      <div>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>META FIJADA (COP)</div>
                        <div style={{fontSize:22,fontWeight:800,color:metaDiaria?"#8DC63F":"#94a3b8"}}>{metaDiaria?formatCOP(metaDiaria):"Sin meta"}</div>
                        {!metaDiaria && <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>El líder no ha fijado meta</div>}
                      </div>
                      <div>
                        <label style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6,display:"block"}}>VENTAS ALCANZADAS (COP)</label>
                        <input type="number" value={ventas} onChange={function(e){if(!estaBloqueada){var v=e.target.value;setVentas(v);dispararAutoGuardado(checks,v,metricas,notas);}}} disabled={estaBloqueada} placeholder="0" style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:18,fontWeight:700,color:"#10b981",background:estaBloqueada?"#f1f5f9":"#f8fafc",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                        {metaDiaria && ventas && (
                          <div style={{fontSize:11,fontWeight:700,marginTop:4,color:Number(ventas)>=metaDiaria?"#10b981":"#f59e0b"}}>
                            {Math.round(Number(ventas)/metaDiaria*100)}% de la meta

                      </div>
                    </div>
                  </div>
                </div>

                {metricasList.length > 0 && (
                <div>
                  <SectionTitle text="Bloque 3 - Actividades y rendimiento"/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {metricasList.map(function(m) {
                      return (
                        <div key={m.code} style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",border:"1.5px solid #e2e8f0"}}>
                          <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.nombre}</div>
                          <input type="number" min="0" value={metricas[m.code]||""} onChange={function(e){if(!estaBloqueada)setMet(m.code,e.target.value);}} disabled={estaBloqueada} placeholder="0" style={{width:"100%",padding:"7px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:16,fontWeight:700,color:"#1e293b",background:estaBloqueada?"#f1f5f9":"#fff",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                        </div>
                      );
                    })}
                  </div>
                </div>
                )}

                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5,display:"block"}}>Notas / Observacíones</label>
                  <textarea value={notas} onChange={function(e){if(!estaBloqueada){var n=e.target.value;setNotas(n);dispararAutoGuardado(checks,ventas,metricas,n);}}} disabled={estaBloqueada} rows={3} placeholder="Novedades del turno..." style={{width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:14,color:"#1e293b",background:estaBloqueada?"#f1f5f9":"#f8fafc",outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:"vertical",lineHeight:1.5}}/>
                </div>
              </div>
            )}

            {confirmarBorrar && (
              <div style={{padding:"18px",borderRadius:14,border:"2px solid #fca5a5",background:"#fef2f2"}}>
                <div style={{fontSize:14,fontWeight:800,color:"#991b1b",marginBottom:6}}>Borrar bitácora del día</div>
                <div style={{fontSize:13,color:"#b91c1c",marginBottom:14}}>
                  ¿Estás seguro de que quieres eliminar toda la información registrada hoy? Esta acción no se puede deshacer.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={handleBorrar} style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                    Sí, borrar todo
                  </button>
                  <button onClick={function(){setConfirmarBorrar(false);}} style={{flex:1,padding:"11px 0",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                    Cancelar
                  </button>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:8,flexDirection:"column"}}>
              <div style={{display:"flex",gap:8}}>
                <button onClick={handleSave} disabled={!rol || estaBloqueada} style={{flex:1,padding:13,borderRadius:12,border:"none",background:estaBloqueada?"#e2e8f0":saved?"#10b981":!rol?"#e2e8f0":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:(!rol||estaBloqueada)?"#94a3b8":"#fff",fontSize:15,fontWeight:700,cursor:(rol&&!estaBloqueada)?"pointer":"default"}}>
                  {estaBloqueada ? (esDespuesDe11pm && !yaGuardoConBloqueo ? "🔒 Hora límite (11pm)" : "🔒 Bloqueada") : saved ? "✓ Bitácora finalizada" : !rol ? "Sin turno este día" : "Guardar y finalizar"}
                </button>
                {existingData[asesora+"__"+fecha] && !confirmarBorrar && !estaBloqueada && (
                  <button onClick={function(){setConfirmarBorrar(true);}} style={{padding:"13px 16px",borderRadius:12,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>
                    Borrar
                  </button>
                )}
                {existingData[asesora+"__"+fecha] && !confirmarBorrar && estaBloqueada && isAdmin && (
                  <button onClick={function(){setConfirmarBorrar(true);}} style={{padding:"13px 16px",borderRadius:12,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>
                    Borrar
                  </button>
                )}
              </div>
              {existingData[asesora+"__"+fecha] && rol && (
                <button onClick={generarPDF} style={{width:"100%",padding:11,borderRadius:12,border:"1.5px solid #d4edaa",background:"#eef6d5",color:"#3d6b10",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  📄 Descargar bitácora en PDF
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }


    // ===================== DASHBOARD =====================
    function DashboardView(props) {
      var allEntries = props.entries;
      var config = props.config;
      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;
      var metricasDef = config.metricas || METRICAS_BASE;

      var [tab, setTab] = useState("hoy");
      var [filtroA, setFiltroA] = useState("Todas");
      var [filtroF, setFiltroF] = useState("");
      var [analisisDesde, setAnalisisDesde] = useState(function(){return today().slice(0,7)+"-01";});
      var [analisisHasta, setAnalisisHasta] = useState(function(){return today();});
      var [analisisAsesora, setAnalisisAsesora] = useState("Todas");
      var [fechaDesde, setFechaDesde] = useState(function(){
        var d = new Date(); d.setDate(d.getDate()-6);
        var off = d.getTimezoneOffset(); var loc = new Date(d.getTime()-off*60000);
        return loc.toISOString().slice(0,10);
      });
      var [fechaHasta, setFechaHasta] = useState(function(){return today();});

      var turnosHoy = getTurnosDelDia(today(), config.overrides||{}, config);
      var todasEntries = Object.values(allEntries);

      // ── Helpers ──
      function getMetrica(e, code) { return Number((e.metricas&&e.metricas[code])||0); }
      function sumMetrica(lista, code) { return lista.reduce(function(s,e){return s+getMetrica(e,code);},0); }
      function avgPct(lista) {
        var ps = lista.map(function(e){return pctCheck(e.checks);}).filter(function(v){return v!==null;});
        return ps.length ? Math.round(ps.reduce(function(s,v){return s+v;},0)/ps.length) : null;
      }
      function colorPct(v) { return v===null?"#94a3b8":v>=90?"#10b981":v>=70?"#f59e0b":"#ef4444"; }

      // ── Datos HOY ──
      var asesorasHoy = ASESORAS.map(function(a,i){
        var rol = turnosHoy[a];
        var entry = allEntries[a+"__"+today()];
        var meta = getMetaEfectiva(config, today(), rol);
        var ventas = entry ? Number(entry.ventas||0) : 0;
        var pct = entry ? pctCheck(entry.checks) : null;
        var pctVentas = meta && ventas ? Math.round(ventas/meta*100) : null;
        return {a:a, i:i, rol:rol, entry:entry, meta:meta, ventas:ventas, pct:pct, pctVentas:pctVentas};
      });
      var totalVentasHoy = asesorasHoy.reduce(function(s,x){return s+x.ventas;},0);
      var registradasHoy = asesorasHoy.filter(function(x){return !!x.entry;}).length;
      var trabajanHoy = asesorasHoy.filter(function(x){return !!x.rol;}).length;

      // ── Datos PERÍODO ──
      var entriesPeriodo = todasEntries.filter(function(e){return e.fecha>=fechaDesde&&e.fecha<=fechaHasta;});
      var datosPeriodo = ASESORAS.map(function(a,i){
        var sus = entriesPeriodo.filter(function(e){return e.asesora===a;});
        var ventas = sus.reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
        var pctT = avgPct(sus);
        var metaTotal = sus.reduce(function(s,e){
          var m = getMetaEfectiva(config,e.fecha,e.rol);
          return s+(m?Number(m):0);
        },0);
        var pctMeta = metaTotal>0 ? Math.round(ventas/metaTotal*100) : null;
        return {
          a:a, i:i,
          registros: sus.length,
          ventas: ventas,
          metaTotal: metaTotal,
          pctMeta: pctMeta,
          pctTareas: pctT,
          msgs: sumMetrica(sus,"R001"),
          atajos: sumMetrica(sus,"R009"),
          campanas: sumMetrica(sus,"R002"),
          seguimientos: sumMetrica(sus,"R003"),
          llamadas: sumMetrica(sus,"R004"),
          ventasPresenciales: sumMetrica(sus,"R005"),
          ventas2da: sumMetrica(sus,"R006"),
          ventas1ra: sumMetrica(sus,"R007"),
          novedades: sumMetrica(sus,"R011"),
        };
      }).sort(function(a,b){return b.ventas-a.ventas;});
      var fechasUnicas = Array.from(new Set(entriesPeriodo.map(function(e){return e.fecha;}))).sort();
      var maxVentasDia = Math.max.apply(null, fechasUnicas.map(function(f){
        return entriesPeriodo.filter(function(e){return e.fecha===f;}).reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
      }).concat([1]));

      // Datos por asesora x rol (para gráfico de rendimiento)
      var rendimientoPorAsesoraRol = ASESORAS.map(function(a, ai) {
        var roles = getRoleKeys(config);
        var datosRol = roles.map(function(rol) {
          var sus = entriesPeriodo.filter(function(e){ return e.asesora===a && e.rol===rol; });
          if (sus.length === 0) return null;
          var ventas = sus.reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
          var pctT = avgPct(sus);
          var metaTotal = sus.reduce(function(s,e){
            var m = getMetaEfectiva(config,e.fecha,rol);
            return s+(m?Number(m):0);
          },0);
          var pctMeta = metaTotal>0 ? Math.round(ventas/metaTotal*100) : null;
          return { rol:rol, dias:sus.length, ventas:ventas, pctTareas:pctT, pctMeta:pctMeta };
        }).filter(Boolean);
        return { a:a, ai:ai, datos:datosRol };
      }).filter(function(x){ return x.datos.length > 0; });

      // ── Historial ──
      var listaHistorial = todasEntries
        .filter(function(e){return (filtroA==="Todas"||e.asesora===filtroA)&&(!filtroF||e.fecha===filtroF);})
        .sort(function(a,b){return b.fecha.localeCompare(a.fecha);});

      var sel = {padding:"7px 10px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,background:"#f8fafc",color:"#1e293b",cursor:"pointer",fontFamily:"inherit"};
      var tabBtn = function(id,lbl){return <button onClick={function(){setTab(id);}} style={{padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:tab===id?"#8DC63F":"transparent",color:tab===id?"#fff":"#64748b",fontFamily:"inherit"}}>{lbl}</button>;};
      var card = {background:"#fff",borderRadius:14,border:"1px solid #e2e8f0",padding:"16px 18px"};

      return (
        <div style={{maxWidth:1000,margin:"0 auto",padding:"0 16px 40px"}}>

          {/* Header */}
          <div style={{marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{fontSize:20,fontWeight:800,color:"#1a2e0a",margin:"0 0 2px"}}>Dashboard</h2>
              <span style={{fontSize:12,color:"#94a3b8"}}>{todasEntries.length} registros totales</span>
            </div>
            <div style={{display:"flex",gap:3,background:"#f1f5f9",borderRadius:10,padding:4}}>
              {tabBtn("hoy","Hoy")}
              {tabBtn("periodo","Período")}
              {tabBtn("historial","Historial")}
            </div>
          </div>

          {/* ══════ TAB HOY ══════ */}
          {tab === "hoy" && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* KPIs del día */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
                {[
                  {label:"Trabajando hoy", val:trabajanHoy+"/"+ASESORAS.length, color:"#8DC63F"},
                  {label:"Registradas", val:registradasHoy+"/"+trabajanHoy, color:"#10b981"},
                  {label:"Ventas del día", val:totalVentasHoy>0?formatCOP(totalVentasHoy):"$0", color:"#6366f1"},
                  {label:"Pendientes", val:(trabajanHoy-registradasHoy)+"", color:trabajanHoy-registradasHoy>0?"#f59e0b":"#10b981"},
                ].map(function(k,i){
                  return (
                    <div key={i} style={Object.assign({},card,{textAlign:"center"})}>
                      <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{k.label}</div>
                      <div style={{fontSize:22,fontWeight:900,color:k.color}}>{k.val}</div>
                    </div>
                  );
                })}
              </div>

              {/* Alertas tardanzas */}
              {(function(){
                var asistHoy = (config.asistencia && config.asistencia[today()]) || {};
                var tardanzas = ASESORAS.filter(function(a){
                  var fbKey = a.replace(/[.#$\[\]]/g,"_");
                  var reg = asistHoy[fbKey];
                  return reg && reg.puntualidad === "Tarde";
                });
                if (tardanzas.length === 0) return null;
                return (
                  <div style={{padding:"12px 16px",borderRadius:12,background:"#fffbeb",border:"2px solid #f59e0b",display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:20}}>&#9888;&#65039;</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:"#92400e"}}>Llegadas tarde hoy</div>
                      <div style={{fontSize:12,color:"#b45309"}}>{tardanzas.join(", ")}</div>
                    </div>
                  </div>
                );
              })()}

              {/* Tarjetas asesoras */}
              <div style={card}>
                <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Estado por asesora</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
                  {asesorasHoy.map(function(x){
                    var c = x.rol ? (getRoleColors(config)[x.rol]||{}) : {};
                    var estado = !x.rol ? "libre" : !x.entry ? "pendiente" : "registrada";
                    return (
                      <div key={x.a} style={{padding:"12px 14px",borderRadius:12,
                        border:"2px solid "+(estado==="registrada"?(c.dot||"#10b981"):estado==="pendiente"?"#fde68a":"#e2e8f0"),
                        background:estado==="registrada"?(c.bg||"#f0fdf4"):estado==="pendiente"?"#fffbeb":"#f8fafc"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                          <div style={{width:34,height:34,borderRadius:10,background:AVATAR_BG[x.i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(x.a)}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.a.split(" ")[0]}</div>
                            <div style={{fontSize:10,color:"#64748b"}}>{x.a.split(" ").slice(1).join(" ")}</div>
                          </div>
                          {estado==="registrada" && <Ring value={x.pct}/>}
                        </div>
                        {x.rol ? <RolBadge rol={x.rol}/> : <span style={{fontSize:11,color:"#94a3b8",fontStyle:"italic"}}>Día libre</span>}
                        {x.meta>0 && <div style={{fontSize:11,color:"#64748b",marginTop:5}}>Meta: <b style={{color:"#8DC63F"}}>{formatCOP(x.meta)}</b></div>}
                        {x.ventas>0 && (
                          <div style={{marginTop:4}}>
                            <span style={{fontSize:12,fontWeight:700,color:"#10b981"}}>{formatCOP(x.ventas)}</span>
                            {x.pctVentas!==null && <span style={{fontSize:10,color:x.pctVentas>=100?"#10b981":"#f59e0b",marginLeft:5}}>({x.pctVentas}% meta)</span>}
                          </div>
                        )}
                        {estado==="pendiente" && <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginTop:6}}>⏳ Sin registrar</div>}
                        {estado==="libre" && <div style={{fontSize:11,color:"#94a3b8",marginTop:4,fontStyle:"italic"}}>No trabaja hoy</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* ══════ TAB PERÍODO ══════ */}
          {tab === "periodo" && (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Filtros */}
              <div style={Object.assign({},card,{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"})}>
                <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>Desde</span>
                <input type="date" value={fechaDesde} onChange={function(e){setFechaDesde(e.target.value);}} style={sel}/>

              </div>

              {/* Tabla comparativa */}
              <div style={Object.assign({},card,{padding:0,overflow:"hidden"})}>

                    <thead>

                          return <th key={h} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:10,textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:"1px solid #e2e8f0"}}>{h}</th>;
                        })}
                      </tr>
                    </thead>
                    <tbody>
                      {datosPeriodo.map(function(d,i){
                        var pcT = colorPct(d.pctTareas);
                        var pcM = d.pctMeta===null?"#94a3b8":d.pctMeta>=100?"#10b981":d.pctMeta>=70?"#f59e0b":"#ef4444";
                        return (
                          <tr key={d.a} style={{borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafafa"}}>
                            <td style={{padding:"9px 12px"}}>
                              <div style={{display:"flex",alignItems:"center",gap:7}}>
                                <div style={{width:26,height:26,borderRadius:8,background:AVATAR_BG[d.i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(d.a)}</div>
                                <span style={{fontWeight:600,color:"#1e293b"}}>{d.a.split(" ")[0]}</span>
                              </div>
                            </td>
                            <td style={{padding:"9px 12px",color:"#64748b",fontWeight:600}}>{d.registros}</td>
                            <td style={{padding:"9px 12px",fontWeight:700,color:"#10b981"}}>{d.ventas>0?formatCOP(d.ventas):"-"}</td>
                            <td style={{padding:"9px 12px"}}>{d.pctMeta!==null?<span style={{fontWeight:800,color:pcM}}>{d.pctMeta}%</span>:<span style={{color:"#94a3b8"}}>-</span>}</td>
                            <td style={{padding:"9px 12px"}}>{d.pctTareas!==null?<span style={{fontWeight:800,color:pcT}}>{d.pctTareas}%</span>:<span style={{color:"#94a3b8"}}>-</span>}</td>
                            <td style={{padding:"9px 12px",color:"#475569"}}>{d.msgs||"-"}</td>
                            <td style={{padding:"9px 12px",color:"#475569"}}>{d.llamadas||"-"}</td>
                            <td style={{padding:"9px 12px",color:"#475569"}}>{d.ventas1ra||"-"}</td>
                            <td style={{padding:"9px 12px",color:"#475569"}}>{d.ventas2da||"-"}</td>
                            <td style={{padding:"9px 12px",color:"#475569"}}>{d.seguimientos||"-"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Barras de ventas por día */}
              {fechasUnicas.length > 0 && (
                <div style={card}>
                  <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>Ventas por día</div>
                  <div style={{overflowX:"auto"}}>
                    <div style={{display:"flex",alignItems:"flex-end",gap:6,minHeight:110,minWidth:fechasUnicas.length*50}}>
                      {fechasUnicas.map(function(f){
                        var ventasDia = entriesPeriodo.filter(function(e){return e.fecha===f;}).reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
                        var h = maxVentasDia>0 ? Math.max(4,Math.round((ventasDia/maxVentasDia)*90)) : 4;
                        var esHoy = f===today();
                        return (
                          <div key={f} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:"1 0 46px"}}>
                            <div style={{fontSize:9,fontWeight:700,color:"#10b981",textAlign:"center",minHeight:14}}>{ventasDia>0?(Number(ventasDia/1000).toFixed(0)+"k"):" "}</div>
                            <div style={{width:"100%",height:90,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
                              <div style={{width:"65%",height:h+"%",minHeight:4,background:esHoy?"linear-gradient(180deg,#f59e0b,#d97706)":"linear-gradient(180deg,#8DC63F,#5a8a1f)",borderRadius:"4px 4px 0 0",transition:"height 0.3s"}}/>
                            </div>
                            <div style={{fontSize:9,color:esHoy?"#d97706":"#64748b",fontWeight:esHoy?700:400,textAlign:"center"}}>
                              {new Date(f+"T12:00:00").toLocaleDateString("es-CO",{day:"2-digit",month:"short"})}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

              {/* Ranking de asesoras */}
              <div style={card}>
                <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>Ranking ventas</div>
                {datosPeriodo.filter(function(d){return d.ventas>0;}).map(function(d,i){
                  var maxV = datosPeriodo[0].ventas || 1;
                  var barW = Math.round((d.ventas/maxV)*100);
                  var medallas = ["🥇","🥈","🥉"];
                  return (
                    <div key={d.a} style={{marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{fontSize:14,minWidth:20}}>{medallas[i]||"  "}</span>
                        <div style={{width:26,height:26,borderRadius:7,background:AVATAR_BG[d.i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(d.a)}</div>
                        <span style={{fontSize:12,fontWeight:700,color:"#1e293b",flex:1}}>{d.a.split(" ")[0]}</span>
                        <span style={{fontSize:12,fontWeight:700,color:"#10b981"}}>{formatCOP(d.ventas)}</span>
                        {d.pctMeta!==null && <span style={{fontSize:10,color:d.pctMeta>=100?"#10b981":"#f59e0b",minWidth:40,textAlign:"right"}}>{d.pctMeta}%</span>}
                      </div>
                      <div style={{height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:barW+"%",background:i===0?"linear-gradient(90deg,#f59e0b,#f97316)":i===1?"linear-gradient(90deg,#94a3b8,#64748b)":i===2?"linear-gradient(90deg,#cd7c5b,#a35c3a)":"linear-gradient(90deg,#8DC63F,#5a8a1f)",borderRadius:3,transition:"width 0.5s"}}/>
                      </div>
                    </div>
                  );
                })}
                {datosPeriodo.filter(function(d){return d.ventas>0;}).length===0 && <div style={{color:"#94a3b8",fontSize:13,textAlign:"center",padding:20}}>Sin ventas en el período</div>}
              </div>

            </div>
          )}

          {/* ══════ TAB HISTORIAL ══════ */}
          {tab === "historial" && (function(){
            // Datos para análisis por rol
            var analisisEntries = todasEntries.filter(function(e){
              var matchA = analisisAsesora==="Todas" || e.asesora===analisisAsesora;
              return matchA && e.fecha>=analisisDesde && e.fecha<=analisisHasta;
            });
            var asesorasAnalisis = analisisAsesora==="Todas" ? ASESORAS : [analisisAsesora];
            var rendAnalisis = asesorasAnalisis.map(function(a,ai_idx){
              var aiReal = ASESORAS.indexOf(a);
              var roles = getRoleKeys(config);
              var datosRol = roles.map(function(rol){
                var sus = analisisEntries.filter(function(e){return e.asesora===a && e.rol===rol;});
                if (sus.length===0) return null;
                var ventas = sus.reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
                var pctT = avgPct(sus);
                var metaTotal = sus.reduce(function(s,e){var m=getMetaEfectiva(config,e.fecha,rol);return s+(m?Number(m):0);},0);
                var pctMeta = metaTotal>0?Math.round(ventas/metaTotal*100):null;
                var msgs = sumMetrica(sus,"R001");
                var llamadas = sumMetrica(sus,"R004");
                var v1 = sumMetrica(sus,"R007");
                var v2 = sumMetrica(sus,"R006");
                var seguim = sumMetrica(sus,"R003");
                return {rol:rol, dias:sus.length, ventas:ventas, pctTareas:pctT, pctMeta:pctMeta, msgs:msgs, llamadas:llamadas, v1:v1, v2:v2, seguim:seguim};
              }).filter(Boolean);
              return {a:a, ai:aiReal, datos:datosRol};
            }).filter(function(x){return x.datos.length>0;});

            return (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>

              {/* Filtros análisis */}
              <div style={Object.assign({},card,{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"})}>
                <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>Asesora</span>
                <select value={analisisAsesora} onChange={function(e){setAnalisisAsesora(e.target.value);}} style={sel}>
                  <option value="Todas">Todas</option>
                  {ASESORAS.map(function(a){return <option key={a} value={a}>{a}</option>;})}
                </select>
                <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>Desde</span>
                <input type="date" value={analisisDesde} onChange={function(e){setAnalisisDesde(e.target.value);}} style={sel}/>
                <span style={{fontSize:13,fontWeight:700,color:"#475569"}}>Hasta</span>
                <input type="date" value={analisisHasta} onChange={function(e){setAnalisisHasta(e.target.value);}} style={sel}/>
                <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
                  {[["7d","7 días",6],["30d","30 días",29],["mes","Este mes",-1]].map(function(item){
                    return <button key={item[0]} onClick={function(){
                      if(item[0]==="mes"){setAnalisisDesde(today().slice(0,7)+"-01");setAnalisisHasta(today());return;}
                      var d=new Date();d.setDate(d.getDate()-item[2]);
                      var off=d.getTimezoneOffset();var loc=new Date(d.getTime()-off*60000);
                      setAnalisisDesde(loc.toISOString().slice(0,10));setAnalisisHasta(today());
                    }} style={{padding:"5px 11px",borderRadius:8,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#475569",fontWeight:700,fontSize:11,cursor:"pointer"}}>{item[1]}</button>;
                  })}
                </div>
                <span style={{fontSize:11,color:"#94a3b8"}}>{analisisEntries.length} registros</span>
              </div>

              {/* Gráfico de torta — comparativo de ventas por asesora */}
              {(function(){
                // Solo roles con ventas activas
                var rolesVentasActivos = (config.rolesConVentas && config.rolesConVentas.length>0)
                  ? config.rolesConVentas
                  : getRoleKeys(config);
                var dataTorta = ASESORAS.map(function(a,i){
                  var v = analisisEntries
                    .filter(function(e){ return e.asesora===a && rolesVentasActivos.indexOf(e.rol||"")>=0; })
                    .reduce(function(s,e){return s+(Number(e.ventas)||0);},0);
                  return {a:a, i:i, v:v};
                }).filter(function(d){return d.v>0;});
                if (dataTorta.length===0) return null;
                var total = dataTorta.reduce(function(s,d){return s+d.v;},0);
                // Calcular arcos SVG
                var cx=120,cy=120,r=90,ri=50;
                var angulo = -Math.PI/2;
                var arcos = dataTorta.map(function(d){
                  var pct = d.v/total;
                  var ang = pct*2*Math.PI;
                  var x1=cx+r*Math.cos(angulo), y1=cy+r*Math.sin(angulo);
                  var x2=cx+r*Math.cos(angulo+ang), y2=cy+r*Math.sin(angulo+ang);
                  var xi1=cx+ri*Math.cos(angulo), yi1=cy+ri*Math.sin(angulo);
                  var xi2=cx+ri*Math.cos(angulo+ang), yi2=cy+ri*Math.sin(angulo+ang);
                  var large = ang>Math.PI?1:0;
                  var path = "M "+xi1+" "+yi1+" L "+x1+" "+y1+" A "+r+" "+r+" 0 "+large+" 1 "+x2+" "+y2+" L "+xi2+" "+yi2+" A "+ri+" "+ri+" 0 "+large+" 0 "+xi1+" "+yi1+" Z";
                  var labelAng = angulo + ang/2;
                  var lx=cx+(r+ri)/2*Math.cos(labelAng), ly=cy+(r+ri)/2*Math.sin(labelAng);
                  angulo += ang;
                  return {path:path, pct:Math.round(pct*100), lx:lx, ly:ly, color:AVATAR_BG[d.i%AVATAR_BG.length], d:d};
                });
                return (
                  <div style={card}>
                    <div style={{fontSize:11,fontWeight:800,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:16}}>Participación en ventas totales</div>
                    <div style={{display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
                      <svg width="240" height="240" viewBox="0 0 240 240">
                        {arcos.map(function(arc,i){
                          return <path key={i} d={arc.path} fill={arc.color} stroke="#fff" strokeWidth="2"/>;
                        })}
                        <text x="120" y="115" textAnchor="middle" fontSize="11" fill="#64748b" fontWeight="700">TOTAL</text>
                        <text x="120" y="133" textAnchor="middle" fontSize="13" fill="#1a2e0a" fontWeight="900">{formatCOP(total)}</text>
                      </svg>
                      <div style={{display:"flex",flexDirection:"column",gap:10,flex:1,minWidth:180}}>
                        {dataTorta.sort(function(a,b){return b.v-a.v;}).map(function(d,i){
                          var pct=Math.round(d.v/total*100);
                          return (
                            <div key={d.a} style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{width:12,height:12,borderRadius:"50%",background:AVATAR_BG[d.i%AVATAR_BG.length],flexShrink:0}}/>
                              <span style={{fontSize:12,fontWeight:700,color:"#1e293b",flex:1}}>{d.a.split(" ")[0]}</span>
                              <span style={{fontSize:12,fontWeight:700,color:"#10b981"}}>{formatCOP(d.v)}</span>
                              <span style={{fontSize:11,color:"#94a3b8",minWidth:34,textAlign:"right"}}>{pct}%</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Gráficos rendimiento por rol */}
              {rendAnalisis.length === 0
                ? <div style={Object.assign({},card,{textAlign:"center",padding:40,color:"#94a3b8",fontSize:14})}>Sin registros en el período seleccionado</div>
                : rendAnalisis.map(function(x){
                    var maxVentas = Math.max.apply(null, x.datos.map(function(d){return d.ventas;}).concat([1]));
                    var mejorRolVentas = x.datos.reduce(function(best,d){return d.ventas>best.ventas?d:best;}, x.datos[0]);
                    return (
                      <div key={x.a} style={card}>
                        {/* Header asesora */}
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:12,borderBottom:"1px solid #f1f5f9"}}>
                          <div style={{width:40,height:40,borderRadius:12,background:AVATAR_BG[x.ai%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#fff",fontWeight:800}}>{initials(x.a)}</div>
                          <div>
                            <div style={{fontSize:16,fontWeight:800,color:"#1a2e0a"}}>{x.a}</div>
                            <div style={{fontSize:11,color:"#94a3b8"}}>{x.datos.length} rol{x.datos.length>1?"es":""} · {analisisEntries.filter(function(e){return e.asesora===x.a;}).length} registros</div>
                          </div>
                          {x.datos.length>1 && mejorRolVentas && mejorRolVentas.ventas>0 && (
                            <div style={{marginLeft:"auto",padding:"6px 12px",borderRadius:10,background:"#eef6d5",border:"1px solid #d4edaa",textAlign:"right"}}>
                              <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Mejor rol en ventas</div>
                              <div style={{marginTop:2}}><RolBadge rol={mejorRolVentas.rol}/></div>
                            </div>
                          )}
                        </div>

                        {/* Barras por rol */}
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>
                          {x.datos.sort(function(a,b){return b.ventas-a.ventas;}).map(function(d,di){
                            var c = getRoleColors(config)[d.rol] || {};
                            var barW = maxVentas>0 ? Math.max(2, Math.round((d.ventas/maxVentas)*100)) : 2;
                            var pcTColor = colorPct(d.pctTareas);
                            var pcMColor = d.pctMeta===null?"#94a3b8":d.pctMeta>=100?"#10b981":d.pctMeta>=70?"#f59e0b":"#ef4444";
                            return (
                              <div key={d.rol} style={{padding:"12px 14px",borderRadius:12,
                                background:di===0&&d.ventas>0?"#f9fef0":"#f8fafc",
                                border:"1.5px solid "+(di===0&&d.ventas>0?"#d4edaa":"#e2e8f0")}}>
                                {/* Fila principal */}
                                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                                  <RolBadge rol={d.rol}/>
                                  <span style={{fontSize:11,color:"#94a3b8"}}>{d.dias} día{d.dias>1?"s":""}</span>
                                  <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
                                    {d.ventas>0 && <span style={{fontSize:13,fontWeight:800,color:"#10b981"}}>{formatCOP(d.ventas)}</span>}
                                    {d.ventas===0 && <span style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>Sin ventas</span>}
                                    {d.pctMeta!==null && <span style={{fontSize:11,fontWeight:700,color:pcMColor,background:pcMColor+"18",borderRadius:20,padding:"2px 9px"}}>{d.pctMeta}% meta</span>}
                                    {d.pctTareas!==null && <span style={{fontSize:11,fontWeight:700,color:pcTColor,background:pcTColor+"18",borderRadius:20,padding:"2px 9px"}}>{d.pctTareas}% tareas</span>}
                                  </div>
                                </div>
                                {/* Barra ventas */}
                                <div style={{height:10,background:"#e2e8f0",borderRadius:5,overflow:"hidden",marginBottom:10}}>
                                  <div style={{height:"100%",width:d.ventas>0?barW+"%":"0%",
                                    background:"linear-gradient(90deg,"+(c.dot||"#8DC63F")+","+(c.dot||"#5a8a1f")+")",
                                    borderRadius:5,transition:"width 0.6s"}}/>
                                </div>
                                {/* Métricas secundarias */}
                                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                                  {[
                                    {label:"Msgs",val:d.msgs,color:"#0ea5e9"},
                                    {label:"Llamadas",val:d.llamadas,color:"#f59e0b"},
                                    {label:"V.1ra",val:d.v1,color:"#8DC63F"},
                                    {label:"V.2da+",val:d.v2,color:"#a855f7"},
                                    {label:"Seguim.",val:d.seguim,color:"#64748b"},
                                  ].filter(function(m){return m.val>0;}).map(function(m){
                                    return (
                                      <div key={m.label} style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:44}}>
                                        <div style={{fontSize:14,fontWeight:800,color:m.color}}>{m.val}</div>
                                        <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,textTransform:"uppercase"}}>{m.label}</div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })
              }

              {/* Tabla historial detallado — usa los mismos filtros de arriba */}
              <div style={Object.assign({},card,{padding:0,overflow:"hidden"})}>
                <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#0f172a",marginRight:"auto"}}>Registros detallados</span>
                  <button onClick={function(){exportarExcel(analisisEntries.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha);}),config);}} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #d4edaa",background:"#eef6d5",color:"#3d6b10",fontWeight:700,fontSize:12,cursor:"pointer"}}>↓ Exportar</button>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{analisisEntries.length} registros</span>
                </div>
                {analisisEntries.length===0
                  ? <div style={{padding:40,textAlign:"center",color:"#94a3b8",fontSize:14}}>Sin registros</div>
                  : <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead>
                          <tr style={{background:"#f8fafc"}}>
                            {["Fecha","Asesora","Turno","Tareas","Meta","Ventas","% Meta","Msgs","Llamadas","V.1ra","V.2da+","Nov. admin","Notas"].map(function(h){
                              return <th key={h} style={{padding:"9px 12px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:10,textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:"1px solid #e2e8f0"}}>{h}</th>;
                            })}
                          </tr>
                        </thead>
                        <tbody>
                          {analisisEntries.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).map(function(e,i){
                            var p=pctCheck(e.checks); var pc=colorPct(p);
                            var ai=ASESORAS.indexOf(e.asesora);
                            var metaE=getMetaEfectiva(config,e.fecha,e.rol);
                            var pctV=metaE&&e.ventas?Math.round(Number(e.ventas)/metaE*100):null;
                            return (
                              <tr key={e.asesora+"__"+e.fecha} style={{borderTop:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafafa"}}>
                                <td style={{padding:"9px 12px",color:"#64748b",whiteSpace:"nowrap"}}>{new Date(e.fecha+"T12:00:00").toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"2-digit"})}</td>
                                <td style={{padding:"9px 12px"}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                                    <div style={{width:22,height:22,borderRadius:6,background:AVATAR_BG[ai>=0?ai%AVATAR_BG.length:0],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:800}}>{initials(e.asesora)}</div>
                                    <span style={{fontWeight:600,color:"#1e293b"}}>{e.asesora.split(" ")[0]}</span>
                                  </div>
                                </td>
                                <td style={{padding:"9px 12px"}}><RolBadge rol={e.rol}/></td>
                                <td style={{padding:"9px 12px"}}>{p!==null?<span style={{fontWeight:800,color:pc,background:pc+"18",padding:"1px 8px",borderRadius:20,fontSize:10}}>{p}%</span>:<span style={{color:"#94a3b8"}}>-</span>}</td>
                                <td style={{padding:"9px 12px",color:"#8DC63F",fontWeight:700,fontSize:11}}>{metaE?formatCOP(metaE):"-"}</td>
                                <td style={{padding:"9px 12px",fontWeight:700,color:"#10b981"}}>{e.ventas?formatCOP(e.ventas):"-"}</td>
                                <td style={{padding:"9px 12px"}}>{pctV!==null?<span style={{fontWeight:700,color:pctV>=100?"#10b981":"#f59e0b",fontSize:11}}>{pctV}%</span>:<span style={{color:"#94a3b8"}}>-</span>}</td>
                                <td style={{padding:"9px 12px",color:"#475569"}}>{getMetrica(e,"R001")||"-"}</td>
                                <td style={{padding:"9px 12px",color:"#475569"}}>{getMetrica(e,"R004")||"-"}</td>
                                <td style={{padding:"9px 12px",color:"#475569"}}>{getMetrica(e,"R007")||"-"}</td>
                                <td style={{padding:"9px 12px",color:"#475569"}}>{getMetrica(e,"R006")||"-"}</td>
                                <td style={{padding:"9px 12px",color:"#475569"}}>{(function(){var mes=e.fecha?e.fecha.slice(0,7):"";return (config.novedades&&config.novedades[mes]&&config.novedades[mes][e.asesora])||"-";})()}</td>
                                <td style={{padding:"9px 12px",color:"#64748b",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.notas||"-"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                }
              </div>
            </div>
            );
          })()}
        </div>
      );
    }

    // ===================== TURNOS TAB =====================
    function applyOverride(overrides, fecha, persona, rol) {
      var updated = JSON.parse(JSON.stringify(overrides));
      var day = updated[fecha] || {};
      if (rol === "auto") delete day[persona];
      else day[persona] = rol;
      if (Object.keys(day).length === 0) delete updated[fecha];
      else updated[fecha] = day;
      return updated;
    }

    function TurnosTab(props) {
      var overrides = props.overrides;
      var setOverrides = props.setOverrides;
      var onSave = props.onSave;
      var saved = props.saved;
      var ASESORAS = props.asesoras || ASESORAS_DEFAULT;
      var config = props.config || {};

      var [viewMode, setViewMode] = useState("tablero");
      var [semana, setSemana] = useState(function(){return getMondayOf(today());});
      var [weekRoles, setWeekRoles] = useState({});
      var [diaFecha, setDiaFecha] = useState(function(){return today();});
      var [stagingDay, setStagingDay] = useState({});
      // tablero: celda activa para editar {asesora, fecha} o null
      var [celdaActiva, setCeldaActiva] = useState(null);
      var [celdaRol, setCeldaRol] = useState("");

      var diasSemana = getWeekDays(semana);

      function commitOverrides(updated) { setOverrides(updated); onSave(updated); }
      function setWeekRole(asesora, rol) { setWeekRoles(function(w){var n=Object.assign({},w);n[asesora]=w[asesora]===rol?"":rol;return n;}); }

      function applyWeek() {
        var updated = JSON.parse(JSON.stringify(overrides));
        diasSemana.forEach(function(fecha) {
          ASESORAS.forEach(function(a) {
            var r = weekRoles[a];
            if (!r && r !== "libre") return;
            updated = applyOverride(updated, fecha, a, r || "auto");
          });
        });
        commitOverrides(updated);
        setWeekRoles({});
      }

      function stageRol(persona, rol) { setStagingDay(function(s){var n=Object.assign({},s);n[persona]=s[persona]===rol?undefined:rol;return n;}); }

      function applyDay() {
        var updated = JSON.parse(JSON.stringify(overrides));
        Object.entries(stagingDay).forEach(function(entry) {
          var persona = entry[0]; var rol = entry[1];
          if (rol === undefined) return;
          updated = applyOverride(updated, diaFecha, persona, rol);
        });
        commitOverrides(updated);
        setStagingDay({});
      }

      function clearDayOverride(fecha, persona) { commitOverrides(applyOverride(overrides, fecha, persona, "auto")); }
      function clearAllDay(fecha) { var u=JSON.parse(JSON.stringify(overrides));delete u[fecha];commitOverrides(u); }

      // tablero: abrir editor de celda
      function abrirCelda(asesora, fecha) {
        var over = overrides[fecha] && overrides[fecha][asesora];
        var rolActual = over !== undefined ? over : getRolBase(asesora, fecha) || "libre";
        setCeldaActiva({asesora:asesora, fecha:fecha});
        setCeldaRol(rolActual);
      }
      function guardarCelda() {
        if (!celdaActiva) return;
        var updated = applyOverride(overrides, celdaActiva.fecha, celdaActiva.asesora, celdaRol === getRolBase(celdaActiva.asesora, celdaActiva.fecha) ? "auto" : celdaRol);
        commitOverrides(updated);
        setCeldaActiva(null);
      }
      function limpiarCelda() {
        if (!celdaActiva) return;
        commitOverrides(applyOverride(overrides, celdaActiva.fecha, celdaActiva.asesora, "auto"));
        setCeldaActiva(null);
      }

      var hasWeekChanges = Object.values(weekRoles).some(function(r){return r!=="";});
      var hasDayChanges = Object.values(stagingDay).some(function(r){return r!==undefined;});

      var modeBtn = function(id, lbl) {
        return <button onClick={function(){setViewMode(id);}} style={{flex:1,padding:"8px 10px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:viewMode===id?"#8DC63F":"transparent",color:viewMode===id?"#fff":"#64748b",fontFamily:"inherit"}}>{lbl}</button>;
      };

      return (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:16,background:"#f1f5f9",borderRadius:10,padding:4}}>
            {modeBtn("tablero","Tablero")}
            {modeBtn("semana","Por semana")}
            {modeBtn("dia","Día individual")}
          </div>

          {/* ======== TABLERO VISUAL ======== */}
          {viewMode === "tablero" && (
            <div>
              {/* Navegacion semana */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0"}}>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,-7)));setCeldaActiva(null);}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,color:"#475569"}}>{"<"}</button>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#1a2e0a"}}>{fmtWeekLabel(semana)}</div>
                </div>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,7)));setCeldaActiva(null);}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,color:"#475569"}}>{">"}</button>
                <button onClick={function(){setSemana(getMondayOf(today()));setCeldaActiva(null);}} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #d4edaa",background:"#eef6d5",color:"#3d6b10",fontWeight:700,fontSize:11,cursor:"pointer"}}>Hoy</button>
              </div>

              {/* Leyenda */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                {[["#eef6d5","#3d6b10","Automático"],["#eef6d5","#3d6b10","Modificado"],["#fef2f2","#dc2626","Libre"]].map(function(item,i){
                  return <span key={i} style={{fontSize:10,background:item[0],color:item[1],borderRadius:20,padding:"2px 9px",fontWeight:700,border:"1px solid "+(i===1?"#8DC63F":"transparent")}}>{item[2]}</span>;
                })}
                <span style={{fontSize:10,color:"#94a3b8",marginLeft:4,alignSelf:"center"}}>Haz clic en cualquier celda para editar</span>
              </div>

              {/* Tabla */}
              <div style={{overflowX:"auto",borderRadius:14,border:"1px solid #e2e8f0",marginBottom:14}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
                  <thead>
                    <tr style={{background:"#f8fafc"}}>
                      <th style={{padding:"10px 14px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"2px solid #e2e8f0",minWidth:120,position:"sticky",left:0,background:"#f8fafc",zIndex:2}}>Asesora</th>
                      {diasSemana.map(function(d,i){
                        var esHoy=d===today();
                        var tieneOverride=!!(overrides[d]&&Object.keys(overrides[d]).length>0);
                        return (
                          <th key={d} style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:esHoy?"#3d6b10":"#64748b",fontSize:11,borderBottom:"2px solid "+(esHoy?"#8DC63F":"#e2e8f0"),background:esHoy?"#eef6d5":"#f8fafc",minWidth:90,position:"relative"}}>
                            <div>{DIAS_ES[i]}</div>
                            <div style={{fontWeight:400,fontSize:12,color:esHoy?"#3d6b10":"#94a3b8"}}>{new Date(d+"T12:00:00").getDate()}</div>
                            {tieneOverride && <div style={{width:6,height:6,background:"#f59e0b",borderRadius:"50%",margin:"2px auto 0",title:"Tiene modificaciónes"}}/>}
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {ASESORAS.map(function(a,ai){
                      return (
                        <tr key={a} style={{borderBottom:"1px solid #f1f5f9"}}>
                          <td style={{padding:"8px 14px",position:"sticky",left:0,background:"#fff",zIndex:1,borderRight:"1px solid #f1f5f9"}}>
                            <div style={{display:"flex",alignItems:"center",gap:7}}>
                              <div style={{width:28,height:28,borderRadius:8,background:AVATAR_BG[ai%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                              <span style={{fontSize:12,fontWeight:700,color:"#1e293b",whiteSpace:"nowrap"}}>{a.split(" ")[0]}</span>
                            </div>
                          </td>
                          {diasSemana.map(function(d){
                            var over = overrides[d] && overrides[d][a];
                            var rolBase = getRolBase(a, d);
                            var rolFijo = (!rolBase && config.rolesAsesoras && config.rolesAsesoras[a]) ? config.rolesAsesoras[a] : null;
                            var esManual = over !== undefined;
                            var rolMostrar = esManual ? (over === "libre" ? null : over) : (rolBase || rolFijo);
                            var c = rolMostrar ? ROLE_COLORS[rolMostrar] : null;
                            var esHoy = d === today();
                            var activa = celdaActiva && celdaActiva.asesora===a && celdaActiva.fecha===d;

                            return (
                              <td key={d} onClick={function(){abrirCelda(a,d);}} style={{padding:"5px 4px",textAlign:"center",background:activa?"#fffbeb":esHoy?"#fafff5":"#fff",cursor:"pointer",borderLeft:"1px solid #f1f5f9",transition:"background 0.1s"}}
                                onMouseEnter={function(e){if(!activa)e.currentTarget.style.background="#f0fdf4";}}
                                onMouseLeave={function(e){if(!activa)e.currentTarget.style.background=activa?"#fffbeb":esHoy?"#fafff5":"#fff";}}>
                                {rolMostrar ? (
                                  <div style={{padding:"4px 5px",borderRadius:8,background:esManual?"#eef6d5":(c?c.bg:"transparent"),border:"2px solid "+(esManual?"#8DC63F":(c?c.dot+"55":"#e2e8f0")),display:"inline-block",minWidth:72}}>
                                    <div style={{fontSize:10,fontWeight:800,color:esManual?"#3d6b10":(c?c.text:"#64748b"),lineHeight:1.2}}>{rolMostrar}</div>
                                    {esManual && <div style={{fontSize:8,color:"#8DC63F",fontWeight:700,marginTop:1}}>MODIFICADO</div>}
                                  </div>
                                ) : (
                                  <div style={{padding:"4px 5px",borderRadius:8,background:esManual?"#fef2f2":"#f8fafc",border:"2px solid "+(esManual?"#fca5a5":"#e2e8f0"),display:"inline-block",minWidth:72}}>
                                    <div style={{fontSize:10,fontWeight:700,color:esManual?"#dc2626":"#94a3b8",lineHeight:1.2}}>Libre</div>
                                    {esManual && <div style={{fontSize:8,color:"#dc2626",fontWeight:700,marginTop:1}}>MODIFICADO</div>}
                                  </div>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* Editor de celda */}
              {celdaActiva && (
                <div style={{padding:"18px 20px",borderRadius:14,border:"2px solid #f59e0b",background:"#fffbeb",marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:800,color:"#92400e"}}>
                        Editando: {celdaActiva.asesora.split(" ")[0]} — {new Date(celdaActiva.fecha+"T12:00:00").toLocaleDateString("es-CO",{weekday:"long",day:"numeric",month:"short"})}
                      </div>
                      <div style={{fontSize:11,color:"#b45309",marginTop:2}}>
                        Turno base automático: <b>{getRolBase(celdaActiva.asesora, celdaActiva.fecha) || "Libre"}</b>
                      </div>
                    </div>
                    <button onClick={function(){setCeldaActiva(null);}} style={{width:28,height:28,borderRadius:8,border:"none",background:"#fde68a",color:"#92400e",fontWeight:800,fontSize:14,cursor:"pointer"}}>X</button>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
                    <button onClick={function(){setCeldaRol(getRolBase(celdaActiva.asesora,celdaActiva.fecha)||"libre");}} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid #e2e8f0",background:celdaRol===(getRolBase(celdaActiva.asesora,celdaActiva.fecha)||"libre")&&!(overrides[celdaActiva.fecha]&&overrides[celdaActiva.fecha][celdaActiva.asesora])?"#eef6d5":"transparent",color:"#3d6b10",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      Auto ({getRolBase(celdaActiva.asesora,celdaActiva.fecha)||"libre"})
                    </button>
                    <button onClick={function(){setCeldaRol("libre");}} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid #e2e8f0",background:celdaRol==="libre"?"#fef2f2":"transparent",color:celdaRol==="libre"?"#dc2626":"#94a3b8",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      Libre
                    </button>
                    {getRolesRotativos(config).map(function(r){
                      var c=ROLE_COLORS[r]||{};
                      var on=celdaRol===r;
                      return <button key={r} onClick={function(){setCeldaRol(r);}} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid "+(on?c.dot:"#e2e8f0"),background:on?c.bg:"transparent",color:on?c.text:"#94a3b8",fontSize:12,fontWeight:700,cursor:"pointer"}}>{r}</button>;
                    })}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={guardarCelda} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      Guardar cambio
                    </button>
                    {overrides[celdaActiva.fecha]&&overrides[celdaActiva.fecha][celdaActiva.asesora]!==undefined && (
                      <button onClick={limpiarCelda} style={{padding:"10px 14px",borderRadius:10,border:"none",background:"#fef2f2",color:"#dc2626",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                        Restaurar base
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Resumen modificaciónes de la semana */}
              {diasSemana.some(function(d){return overrides[d]&&Object.keys(overrides[d]).length>0;}) && (
                <div style={{padding:"14px 16px",borderRadius:12,background:"#fffbeb",border:"1px solid #fde68a"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#92400e",marginBottom:8}}>Modificaciónes esta semana</div>
                  {diasSemana.map(function(d){
                    if(!overrides[d]||Object.keys(overrides[d]).length===0) return null;
                    return (
                      <div key={d} style={{marginBottom:6}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#b45309",marginRight:8}}>{new Date(d+"T12:00:00").toLocaleDateString("es-CO",{weekday:"short",day:"numeric"})}</span>
                        {Object.entries(overrides[d]).map(function(entry){
                          var persona=entry[0]; var rol=entry[1];
                          return (
                            <span key={persona} style={{fontSize:10,background:"#fff",border:"1px solid #fde68a",borderRadius:20,padding:"1px 8px",marginRight:4,color:"#92400e",fontWeight:600}}>
                              {persona.split(" ")[0]}: {rol==="libre"?"Libre":rol}
                              <button onClick={function(){clearDayOverride(d,persona);}} style={{marginLeft:4,background:"none",border:"none",color:"#dc2626",cursor:"pointer",fontWeight:800,fontSize:10,padding:0}}>x</button>
                            </span>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {viewMode === "semana" && (
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"11px 16px",background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0"}}>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,-7)));setWeekRoles({});}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,color:"#475569"}}>{"<"}</button>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#1a2e0a"}}>{fmtWeekLabel(semana)}</div>
                </div>
                <button onClick={function(){setSemana(getMondayOf(addDays(semana,7)));setWeekRoles({});}} style={{width:32,height:32,borderRadius:8,border:"1.5px solid #e2e8f0",background:"#fff",cursor:"pointer",fontWeight:700,fontSize:13,color:"#475569"}}>{">"}</button>
              </div>

              <div style={{fontSize:10,fontWeight:800,color:"#64748b",textTransform:"uppercase",marginBottom:10}}>Asignar turno a toda la semana</div>
              <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
                {ASESORAS.map(function(a,ai) {
                  var sel2 = weekRoles[a] || "";
