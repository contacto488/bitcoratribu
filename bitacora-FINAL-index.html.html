                    {!esEditando && (
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={function(){abrirEditor(a);}} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #d4edaa",background:"#eef6d5",color:"#3d6b10",fontWeight:700,fontSize:11,cursor:"pointer"}}>
                          {tienePwd?"Cambiar":"Agregar"}
                        </button>
                        {tienePwd && <button onClick={function(){quitarPwd(a);}} style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>Quitar</button>}
                      </div>
                    )}
                  </div>
                  {esEditando && (
                    <div style={{padding:"14px 16px",borderTop:"1px solid #fde68a",background:"#fffbeb"}}>
                      <div style={{fontSize:11,fontWeight:800,color:"#92400e",marginBottom:10}}>
                        {local[a]?"Cambiar contraseña de "+a.split(" ")[0]:"Nueva contraseña para "+a.split(" ")[0]}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:10}}>
                        <div>
                          <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>Nueva contraseña (mínimo 4 caracteres)</label>
                          <input type="password" value={nuevaPwd} onChange={function(e){setNuevaPwd(e.target.value);setErrorMsg("");}} placeholder="Nueva contraseña..." style={inp2} autoFocus/>
                        </div>
                        <div>
                          <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>Confirmar contraseña</label>
                          <input type="password" value={confirmPwd} onChange={function(e){setConfirmPwd(e.target.value);setErrorMsg("");}} onKeyDown={function(e){if(e.key==="Enter")guardarPwd(a);}} placeholder="Repetir contraseña..." style={Object.assign({},inp2,{borderColor:errorMsg?"#fca5a5":"#e2e8f0"})}/>
                        </div>
                      </div>
                      {errorMsg && <div style={{fontSize:12,color:"#dc2626",fontWeight:700,marginBottom:8}}>{errorMsg}</div>}
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={function(){guardarPwd(a);}} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                          Guardar contraseña
                        </button>
                        <button onClick={cerrarEditor} style={{padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:12,cursor:"pointer"}}>Cancelar</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }


    // ===================== TAREAS ADMIN TAB =====================
    function TareasAdminTab(props) {
      // Fusionar tareas de Firebase con roles de TAREAS_BASE para compatibilidad
      var tareasFB = props.tareas || [];
      var listaTareas = tareasFB.map(function(t) {
        // Si la tarea de Firebase no tiene roles o tiene roles vacíos, buscar en TAREAS_BASE
        if (!t.roles || t.roles.length === 0) {
          var base = TAREAS_BASE.find(function(b){ return b.code === t.code; });
          if (base) return Object.assign({}, t, {roles: base.roles});
        }
        return t;
      });
      var setListaTareas = props.setTareas;
      var cfg = props.config || {};
      var onGuardar = props.onSave;
      var onCambiarConfig = props.onConfigChange;
      var guardado = props.saved;
      function onGuardarConfig(nuevaCfg) { if(onCambiarConfig) onCambiarConfig(nuevaCfg); }

      var [editandoCode, setEditandoCode] = useState(null);
      var [textoEdicion, setTextoEdicion] = useState("");
      var [pantallaActiva, setPantallaActiva] = useState("base");
      var [diaActivo, setDiaActivo] = useState("lunes");
      var [confirmarLimpiarDia, setConfirmarLimpiarDia] = useState(null);
      var [nuevaTarea, setNuevaTarea] = useState({code:"", nombre:"", roles:[]});
      var [confirmarEliminar, setConfirmarEliminar] = useState(null);
      // Estados para Tareas Programadas (deben estar al nivel del componente)
      var [progNuevaFecha, setProgNuevaFecha] = useState(today());
      var [progNuevoDia, setProgNuevoDia] = useState("15");
      var [progNuevoTipo, setProgNuevoTipo] = useState("fecha");
      var [progNuevasTareas, setProgNuevasTareas] = useState([]);
      var [progNuevosRoles, setProgNuevosRoles] = useState([]);
      var [progNuevaNota, setProgNuevaNota] = useState("");
      var [progExpandido, setProgExpandido] = useState(null);
      var [progBusqueda, setProgBusqueda] = useState("");

      var estiloInput = {padding:"9px 12px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:13, color:"#1e293b", background:"#f8fafc", outline:"none", fontFamily:"inherit"};

      var rolesDisponibles = getRoleKeys(cfg);
      // Agregar roles fijos al listado si no estan
      var rolesFijosExtra = ["Servicio al cliente","Lider"];
      rolesFijosExtra.forEach(function(rf){
        if(rolesDisponibles.indexOf(rf)<0) rolesDisponibles = rolesDisponibles.concat([rf]);
      });
      var coloresRoles = getRoleColors(cfg);

      // ── funciones base ──
      function cambiarRolTarea(code, rol) {
        setListaTareas(function(lista) {
          return lista.map(function(t) {
            if (t.code !== code) return t;
            var rolesActuales = Array.isArray(t.roles) ? t.roles : [];
            var nuevosRoles = rolesActuales.indexOf(rol) >= 0
              ? rolesActuales.filter(function(r) { return r !== rol; })
              : rolesActuales.concat([rol]);
            return Object.assign({}, t, {roles: nuevosRoles});
          });
        });
      }

      function eliminarTarea(code) {
        setListaTareas(function(lista) { return lista.filter(function(t) { return t.code !== code; }); });
      }

      function empezarEdicion(t) {
        setEditandoCode(t.code);
        setTextoEdicion(t.nombre || "");
      }

      function confirmarEdicion(code) {
        if (!textoEdicion.trim()) return;
        setListaTareas(function(lista) {
          return lista.map(function(t) {
            return t.code === code ? Object.assign({}, t, {nombre: textoEdicion.trim()}) : t;
          });
        });
        setEditandoCode(null);
      }

      function agregarNuevaTarea() {
        if (!nuevaTarea.code.trim() || !nuevaTarea.nombre.trim()) return;
        setListaTareas(function(lista) { return lista.concat([{code: nuevaTarea.code.trim(), nombre: nuevaTarea.nombre.trim(), roles: []}]); });
        setNuevaTarea({code:"", nombre:"", roles:[]});
      }

      function toggleRolNueva(rol) {
        setNuevaTarea(function(nt) {
          var rolesNt = Array.isArray(nt.roles) ? nt.roles : [];
          var nuevosRoles = rolesNt.indexOf(rol) >= 0
            ? rolesNt.filter(function(r) { return r !== rol; })
            : rolesNt.concat([rol]);
          return Object.assign({}, nt, {roles: nuevosRoles});
        });
      }

      // ── funciones semanales ──
      var [feedbackSemana, setFeedbackSemana] = useState(null);

      function toggleConfigSemana(dia, rol, code, tipo) {
        var semana = JSON.parse(JSON.stringify(cfg.tareasSemanales || {}));
        if (!semana[dia]) semana[dia] = {};
        if (!semana[dia][rol]) semana[dia][rol] = {add:[], remove:[]};
        var lista = semana[dia][rol][tipo] || [];
        var pos = lista.indexOf(code);
        if (pos >= 0) { lista.splice(pos, 1); } else { lista.push(code); }
        semana[dia][rol][tipo] = lista;
        var opuesto = tipo === "add" ? "remove" : "add";
        semana[dia][rol][opuesto] = (semana[dia][rol][opuesto] || []).filter(function(c) { return c !== code; });
        if (semana[dia][rol].add.length === 0 && semana[dia][rol].remove.length === 0) {
          delete semana[dia][rol];
        }
        if (Object.keys(semana[dia] || {}).length === 0) { delete semana[dia]; }
        onCambiarConfig(Object.assign({}, cfg, {tareasSemanales: semana}));
        setFeedbackSemana(code + tipo);
        setTimeout(function(){ setFeedbackSemana(null); }, 1500);
      }

      function limpiarConfigDia(dia) {
        var semana = JSON.parse(JSON.stringify(cfg.tareasSemanales || {}));
        delete semana[dia];
        onCambiarConfig(Object.assign({}, cfg, {tareasSemanales: semana}));
      }

      function getConfigDiaRol(dia, rol) {
        var semana = cfg.tareasSemanales || {};
        var d = semana[dia] || {};
        var r = d[rol] || {};
        return { add: Array.isArray(r.add) ? r.add : [], remove: Array.isArray(r.remove) ? r.remove : [] };
      }

      // ── render botones ──
      var btnPantalla = function(id, lbl) {
        return (
          <button
            onClick={function() { setPantallaActiva(id); }}
            style={{flex:1, padding:"8px 10px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:12,
              background: pantallaActiva === id ? "#8DC63F" : "transparent",
              color: pantallaActiva === id ? "#fff" : "#64748b", fontFamily:"inherit"}}
          >{lbl}</button>
        );
      };

      return (
        <div>
          <div style={{display:"flex", gap:4, marginBottom:16, background:"#f1f5f9", borderRadius:10, padding:4}}>
            {btnPantalla("base", "Tareas base")}
            {btnPantalla("semana", "Por día de semana")}
            {btnPantalla("programadas", "Programadas")}
            {btnPantalla("grupos", "Grupos")}
          </div>

          {pantallaActiva === "base" && (
            <div>
              <p style={{fontSize:13, color:"#64748b", marginTop:0, marginBottom:14}}>
                Lista de todas las tareas disponibles. Usa ✏ para editar el nombre. Asigna cada tarea a los días y roles en la pestaña "Por día de semana".
              </p>

              <div style={{display:"flex", flexDirection:"column", gap:5, marginBottom:16}}>
                {listaTareas.map(function(t) {
                  var esteEditando = editandoCode === t.code;
                  return (
                    <div key={t.code} style={{display:"flex", alignItems:"center", gap:8, padding:"10px 14px", borderRadius:11,
                      border:"1.5px solid " + (esteEditando ? "#f59e0b" : "#e2e8f0"),
                      background: esteEditando ? "#fffbeb" : "#f8fafc"}}>
                      <span style={{fontSize:10, fontWeight:700, color:"#94a3b8", minWidth:34}}>{t.code}</span>
                      {esteEditando ? (
                        <input
                          value={textoEdicion}
                          onChange={function(e) { setTextoEdicion(e.target.value); }}
                          onKeyDown={function(e) {
                            if (e.key === "Enter") confirmarEdicion(t.code);
                            if (e.key === "Escape") setEditandoCode(null);
                          }}
                          autoFocus
                          style={Object.assign({}, estiloInput, {flex:1, fontSize:13, fontWeight:600, borderColor:"#f59e0b", background:"#fff"})}
                        />
                      ) : (
                        <span style={{fontWeight:600, color:"#1e293b", fontSize:13, flex:1}}>{t.nombre}</span>
                      )}
                      <div style={{display:"flex", gap:4}}>
                        {esteEditando ? (
                          <>
                            <button onClick={function() { confirmarEdicion(t.code); }}
                              style={{padding:"4px 12px", borderRadius:7, border:"none", background:"#8DC63F", color:"#fff", fontWeight:700, fontSize:11, cursor:"pointer"}}>✓ Guardar</button>
                            <button onClick={function() { setEditandoCode(null); }}
                              style={{padding:"4px 10px", borderRadius:7, border:"1.5px solid #e2e8f0", background:"#fff", color:"#64748b", fontWeight:700, fontSize:11, cursor:"pointer"}}>Cancelar</button>
                          </>
                        ) : (
                          <>
                            <button onClick={function() { empezarEdicion(t); }}
                              style={{padding:"4px 10px", borderRadius:7, border:"1.5px solid #e2e8f0", background:"#fff", color:"#64748b", fontWeight:700, fontSize:11, cursor:"pointer"}}>✏ Editar</button>
                            <button onClick={function() { setConfirmarEliminar(t.code); setEditandoCode(null); }}
                              style={{padding:"4px 9px", borderRadius:7, border:"none", background:"#fef2f2", color:"#ef4444", fontWeight:700, fontSize:11, cursor:"pointer"}}>✕</button>
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{padding:"14px 16px", borderRadius:12, border:"2px dashed #e2e8f0", background:"#f8fafc", marginBottom:14}}>
                <div style={{fontSize:11, fontWeight:700, color:"#64748b", marginBottom:10}}>+ NUEVA TAREA</div>
                <div style={{display:"grid", gridTemplateColumns:"90px 1fr", gap:8}}>
                  <input placeholder="Código" value={nuevaTarea.code}
                    onChange={function(e) { setNuevaTarea(function(x) { return Object.assign({}, x, {code: e.target.value}); }); }}
                    style={estiloInput}/>
                  <input placeholder="Nombre" value={nuevaTarea.nombre}
                    onChange={function(e) { setNuevaTarea(function(x) { return Object.assign({}, x, {nombre: e.target.value}); }); }}
                    onKeyDown={function(e){ if(e.key==="Enter") agregarNuevaTarea(); }}
                    style={estiloInput}/>
                </div>
                <button onClick={agregarNuevaTarea}
                  style={{marginTop:10, padding:"8px 18px", borderRadius:9, border:"none", background:"#8DC63F", color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer"}}>
                  Agregar tarea
                </button>
              </div>

              {confirmarEliminar && (
                <div style={{marginBottom:14,padding:"16px",borderRadius:14,border:"2px solid #fca5a5",background:"#fef2f2"}}>
                  <div style={{fontSize:14,fontWeight:800,color:"#991b1b",marginBottom:6}}>¿Eliminar esta tarea?</div>
                  <div style={{fontSize:13,color:"#b91c1c",marginBottom:14}}>
                    Se eliminará <b>{(listaTareas.find(function(t){return t.code===confirmarEliminar;})||{}).nombre}</b> de la lista y de todas las configuraciones semanales.
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={function(){eliminarTarea(confirmarEliminar);setConfirmarEliminar(null);}}
                      style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      Sí, eliminar
                    </button>
                    <button onClick={function(){setConfirmarEliminar(null);}}
                      style={{flex:1,padding:"10px 0",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      Cancelar
                    </button>
                  </div>
                </div>
              )}

              <button onClick={function() { onGuardar(listaTareas); }}
                style={{width:"100%", padding:12, borderRadius:11, border:"none", fontWeight:700, fontSize:14, cursor:"pointer",
                  background: guardado ? "#10b981" : "linear-gradient(135deg,#8DC63F,#5a8a1f)", color:"#fff"}}>
                {guardado ? "Guardado" : "Guardar cambios"}
              </button>
            </div>
          )}

          {pantallaActiva === "semana" && (
            <div>
              <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:14}}>
                Define las tareas de cada rol por día. Las secciones se dividen según el grupo asignado en <b>Grupos</b>.
              </p>

              {/* Selector de días */}
              <div style={{display:"flex",gap:5,marginBottom:16,flexWrap:"wrap"}}>
                {DIAS_SEMANA_KEYS.map(function(dk,di){
                  var tieneConf = !!(cfg.tareasSemanales && cfg.tareasSemanales[dk] && Object.keys(cfg.tareasSemanales[dk]).length > 0);
                  var activo = diaActivo === dk;
                  return (
                    <button key={dk} onClick={function(){setDiaActivo(dk);}}
                      style={{padding:"7px 14px",borderRadius:20,fontWeight:700,fontSize:12,cursor:"pointer",
                        border:"1.5px solid "+(activo?"#8DC63F":tieneConf?"#f59e0b":"#e2e8f0"),
                        background:activo?"#8DC63F":tieneConf?"#fffbeb":"#f8fafc",
                        color:activo?"#fff":tieneConf?"#92400e":"#64748b"}}>
                      {DIAS_SEMANA_LABELS[di]}{tieneConf&&!activo?" •":""}
                    </button>
                  );
                })}
              </div>

              {/* Header del día */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                <div>
                  <div style={{fontSize:15,fontWeight:800,color:"#1a2e0a"}}>{DIAS_SEMANA_LABELS[DIAS_SEMANA_KEYS.indexOf(diaActivo)]}</div>
                  <div style={{fontSize:11,color:"#64748b",marginTop:2}}>Activa o desactiva los roles que trabajan este día abajo</div>
                </div>
                {cfg.tareasSemanales && cfg.tareasSemanales[diaActivo] && (
                  confirmarLimpiarDia === diaActivo ? (
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>¿Borrar?</span>
                      <button onClick={function(){limpiarConfigDia(diaActivo);setConfirmarLimpiarDia(null);}} style={{padding:"3px 10px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>Sí</button>
                      <button onClick={function(){setConfirmarLimpiarDia(null);}} style={{padding:"3px 10px",borderRadius:7,border:"1px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>No</button>
                    </div>
                  ) : (
                    <button onClick={function(){setConfirmarLimpiarDia(diaActivo);}} style={{padding:"4px 12px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>Limpiar día</button>
                  )
                )}
              </div>

              {/* Selector de roles activos */}
              {(function(){
                var rolesDia = (cfg.rolesPorDia && cfg.rolesPorDia[diaActivo]) || (
                  diaActivo==="sabado" ? ["Leads Sab","Clientes Sab","Servicio al cliente","Lider"] :
                  diaActivo==="domingo" ? ["Hibrido","Servicio al cliente"] :
                  rolesDisponibles.filter(function(r){return ["Leads Sab","Clientes Sab"].indexOf(r)<0;})
                );
                return (
                  <div style={{marginBottom:16,padding:"12px 14px",background:"#f0f9ff",borderRadius:12,border:"1px solid #bae6fd"}}>
                    <div style={{fontSize:11,fontWeight:800,color:"#0369a1",marginBottom:8}}>Roles que trabajan este día — haz clic para activar/desactivar</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {rolesDisponibles.map(function(r){
                        var activo = rolesDia.indexOf(r) >= 0;
                        var c = coloresRoles[r] || {};
                        return (
                          <button key={r} onClick={function(){
                            var nuevos = activo ? rolesDia.filter(function(x){return x!==r;}) : rolesDia.concat([r]);
                            var rpd = Object.assign({},cfg.rolesPorDia||{}); rpd[diaActivo]=nuevos;
                            onGuardarConfig(Object.assign({},cfg,{rolesPorDia:rpd}));
                          }} style={{padding:"4px 12px",borderRadius:20,fontWeight:700,fontSize:11,cursor:"pointer",
                            border:"1.5px solid "+(activo?(c.dot||"#8DC63F"):"#e2e8f0"),
                            background:activo?(c.bg||"#eef6d5"):"#fff",
                            color:activo?(c.text||"#3d6b10"):"#94a3b8"}}>
                            {r}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}

              {/* Secciones por grupo — dinámicas según config.gruposRoles */}
              {(function(){
                var rolesDia = (cfg.rolesPorDia && cfg.rolesPorDia[diaActivo]) || (
                  diaActivo==="sabado" ? ["Leads Sab","Clientes Sab","Servicio al cliente","Lider"] :
                  diaActivo==="domingo" ? ["Hibrido","Servicio al cliente"] :
                  rolesDisponibles.filter(function(r){return ["Leads Sab","Clientes Sab"].indexOf(r)<0;})
                );
                var rolesDelDia = rolesDisponibles.filter(function(r){return rolesDia.indexOf(r)>=0;});
                var grupos = cfg.gruposRoles || {
                  vendedores:["Leads T1","Leads T2","Clientes T1","Clientes T2","Leads Sab","Clientes Sab","Hibrido"],
                  soporte:["Servicio al cliente","Lider"]
                };

                // Definición de grupos con su prefijo de tareas
                var definicionGrupos = [
                  {key:"vendedores", label:"Vendedores", emoji:"💼", prefijo:"A", bg:"#eef6d5", border:"#d4edaa", text:"#3d6b10", headerBg:"linear-gradient(135deg,#3d6b10,#5a8a1f)"},
                  {key:"soporte", label:"Soporte (SAC + Líder)", emoji:"🎧", prefijo:"S", bg:"#eef2ff", border:"#c7d2fe", text:"#4338ca", headerBg:"linear-gradient(135deg,#4338ca,#6366f1)"},
                ];

                return definicionGrupos.map(function(gDef){
                  var rolesGrupo = (grupos[gDef.key]||[]).filter(function(r){return rolesDelDia.indexOf(r)>=0;});
                  if (rolesGrupo.length === 0) return null;

                  // Tareas disponibles para este grupo (filtradas por prefijo)
                  var tareasGrupo = listaTareas.filter(function(t){
                    return (t.code||"").toUpperCase().startsWith(gDef.prefijo);
                  });

                  return (
                    <div key={gDef.key} style={{marginBottom:20,borderRadius:16,border:"1.5px solid "+gDef.border,overflow:"hidden"}}>
                      {/* Header sección */}
                      <div style={{padding:"12px 16px",background:gDef.headerBg,display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:18}}>{gDef.emoji}</span>
                        <div style={{fontSize:14,fontWeight:800,color:"#fff"}}>{gDef.label}</div>
                        <span style={{fontSize:10,background:"rgba(255,255,255,0.2)",color:"#fff",borderRadius:20,padding:"2px 8px",fontWeight:700}}>
                          Tareas prefijo {gDef.prefijo}... · {rolesGrupo.length} roles
                        </span>
                      </div>

                      {/* Roles del grupo */}
                      <div style={{padding:"12px 16px",background:gDef.bg}}>
                        {rolesGrupo.map(function(rol){
                          var confRol = getConfigDiaRol(diaActivo, rol);
                          var tareasBase = tareasGrupo.filter(function(t){
                            var r = Array.isArray(t.roles) ? t.roles : [];
                            return r.indexOf(rol) >= 0;
                          });
                          var tareasAgregadas = confRol.add.map(function(code){
                            return listaTareas.find(function(t){return t.code===code;});
                          }).filter(Boolean);
                          var tareasUnificadas = tareasBase.concat(tareasAgregadas.filter(function(ta){
                            return !tareasBase.find(function(tb){return tb.code===ta.code;});
                          }));
                          var tareasDisponibles = tareasGrupo.filter(function(t){
                            return !tareasBase.find(function(b){return b.code===t.code;}) && confRol.add.indexOf(t.code)<0;
                          });
                          var c = coloresRoles[rol] || {};
                          var tieneConf = confRol.add.length>0 || confRol.remove.length>0;

                          return (
                            <div key={rol} style={{marginBottom:10,padding:"12px 14px",borderRadius:12,
                              border:"1.5px solid "+(tieneConf?"#8DC63F":"#e2e8f0"),
                              background:tieneConf?"#f9fef0":"#fff"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                                <span style={{background:c.bg||"#f1f5f9",color:c.text||"#475569",
                                  padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:12,
                                  border:"1.5px solid "+(c.dot||"#e2e8f0")}}>{rol}</span>
                                {tieneConf && <span style={{fontSize:10,background:"#eef6d5",color:"#3d6b10",borderRadius:20,padding:"1px 8px",fontWeight:700}}>Modificado</span>}
                              </div>

                              {/* Tareas activas */}
                              <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:8}}>
                                {tareasUnificadas.filter(function(t){return confRol.remove.indexOf(t.code)<0;}).length===0 && (
                                  <span style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>Sin tareas activas para este día</span>
                                )}
                                {tareasUnificadas.filter(function(t){return confRol.remove.indexOf(t.code)<0;}).map(function(t){
                                  var esAgregada = confRol.add.indexOf(t.code)>=0;
                                  return (
                                    <div key={t.code} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",
                                      borderRadius:9,background:esAgregada?"#f0fdf4":"#fff",
                                      border:"1.5px solid "+(esAgregada?"#86efac":"#e2e8f0")}}>
                                      <span style={{fontSize:10,color:"#94a3b8",minWidth:34,fontWeight:700}}>{t.code}</span>
                                      {esAgregada && <span style={{fontSize:9,background:"#dcfce7",color:"#15803d",borderRadius:20,padding:"1px 6px",fontWeight:700}}>EXTRA</span>}
                                      <span style={{flex:1,fontSize:12,fontWeight:500,color:"#1e293b"}}>{t.nombre}</span>
                                      <button onClick={function(){toggleConfigSemana(diaActivo,rol,t.code,esAgregada?"add":"remove");}}
                                        style={{padding:"3px 9px",borderRadius:7,border:"none",
                                          background:esAgregada?"#fef2f2":"#fef2f2",color:"#ef4444",
                                          fontWeight:700,fontSize:10,cursor:"pointer"}}>
                                        {esAgregada?"↩ Quitar":"✕ Quitar"}
                                      </button>
                                    </div>
                                  );
                                })}
                              </div>

                              {/* Tareas disponibles para agregar */}
                              {tareasDisponibles.length > 0 && (
                                <div>
                                  <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6}}>+ AGREGAR TAREA</div>
                                  <select
                                    value=""
                                    onChange={function(e){
                                      if(e.target.value) toggleConfigSemana(diaActivo,rol,e.target.value,"add");
                                    }}
                                    style={{width:"100%",padding:"8px 10px",borderRadius:9,
                                      border:"1.5px solid "+gDef.border,fontSize:12,color:"#1e293b",
                                      background:"#fff",outline:"none",fontFamily:"inherit",
                                      boxSizing:"border-box",cursor:"pointer"}}>
                                    <option value="">-- Seleccionar tarea ({tareasDisponibles.length} disponibles) --</option>
                                    {tareasDisponibles.map(function(t){
                                      return <option key={t.code} value={t.code}>{t.code} — {t.nombre}</option>;
                                    })}
                                  </select>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                });
              })()}
            </div>
          )}

          {/* ── Panel Programadas ── */}
          {pantallaActiva === "programadas" && (
            <div>
              <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:14}}>
                Programa tareas para fechas específicas o que se repitan mensualmente (ej: el día 15 de cada mes).
                Aparecerán automáticamente en la bitácora de ese día para los roles seleccionados.
              </p>
              {(function(){
                var programadas = cfg.tareasProgr || [];
                function toggleTareaP(code) {
                  setProgNuevasTareas(function(arr){
                    return arr.indexOf(code)>=0 ? arr.filter(function(c){return c!==code;}) : arr.concat([code]);
                  });
                }
                function toggleRolP(rol) {
                  setProgNuevosRoles(function(arr){
                    return arr.indexOf(rol)>=0 ? arr.filter(function(r){return r!==rol;}) : arr.concat([rol]);
                  });
                }
                function agregarProg() {
                  if (progNuevasTareas.length===0 || progNuevosRoles.length===0) return;
                  var entrada = {
                    id: Date.now()+"",
                    tipo: progNuevoTipo,
                    fecha: progNuevoTipo==="fecha" ? progNuevaFecha : null,
                    diaMes: progNuevoTipo==="mensual" ? parseInt(progNuevoDia,10) : null,
                    tareas: progNuevasTareas.slice(),
                    roles: progNuevosRoles.slice(),
                    nota: progNuevaNota.trim()
                  };
                  var updated = programadas.concat([entrada]);
                  onGuardarConfig(Object.assign({}, cfg, {tareasProgr: updated}));
                  setProgNuevasTareas([]); setProgNuevosRoles([]); setProgNuevaNota("");
                }
                function eliminarProg(id) {
                  var updated = programadas.filter(function(p){return p.id!==id;});
                  onGuardarConfig(Object.assign({}, cfg, {tareasProgr: updated}));
                }
                var inp3 = {padding:"8px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",background:"#f8fafc",outline:"none",fontFamily:"inherit"};
                return (
                  <div>
                    {/* Lista de programadas existentes */}
                    {programadas.length > 0 && (
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                        {programadas.map(function(p){
                          var abierto = progExpandido === p.id;
                          var labFecha = p.tipo==="mensual"
                            ? "Cada día "+p.diaMes+" del mes"
                            : "El "+p.fecha;
                          var tareasNombres = (p.tareas||[]).map(function(code){
                            var t = listaTareas.find(function(x){return x.code===code;});
                            return t ? t.nombre : code;
                          });
                          return (
                            <div key={p.id} style={{borderRadius:12,border:"1.5px solid #e2e8f0",background:"#fff",overflow:"hidden"}}>
                              <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:"#f8fafc"}}
                                onClick={function(){setProgExpandido(abierto?null:p.id);}}>
                                <div style={{width:36,height:36,borderRadius:10,background:p.tipo==="mensual"?"#eef2ff":"#eef6d5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                                  {p.tipo==="mensual"?"🔁":"📅"}
                                </div>
                                <div style={{flex:1}}>
                                  <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{labFecha}</div>
                                  <div style={{fontSize:11,color:"#94a3b8"}}>{tareasNombres.length} tarea(s) · {(p.roles||[]).join(", ")}</div>
                                </div>
                                <button onClick={function(e){e.stopPropagation();eliminarProg(p.id);}}
                                  style={{padding:"4px 10px",borderRadius:7,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>✕</button>
                              </div>
                              {abierto && (
                                <div style={{padding:"10px 14px",borderTop:"1px solid #f1f5f9"}}>
                                  {p.nota && <div style={{fontSize:12,color:"#64748b",marginBottom:6,fontStyle:"italic"}}>📝 {p.nota}</div>}
                                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                    {tareasNombres.map(function(n,i){return <span key={i} style={{fontSize:11,background:"#eef6d5",color:"#3d6b10",borderRadius:20,padding:"2px 8px",fontWeight:600}}>{n}</span>;})}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Formulario agregar nueva */}
                    <div style={{padding:"16px",borderRadius:14,border:"2px dashed #e2e8f0",background:"#f8fafc"}}>
                      <div style={{fontSize:12,fontWeight:800,color:"#64748b",marginBottom:12}}>+ NUEVA TAREA PROGRAMADA</div>

                      {/* Tipo */}
                      <div style={{display:"flex",gap:6,marginBottom:12}}>
                        {[["fecha","📅 Fecha específica"],["mensual","🔁 Día del mes"]].map(function(opt){
                          return (
                            <button key={opt[0]} onClick={function(){setProgNuevoTipo(opt[0]);}}
                              style={{flex:1,padding:"8px 0",borderRadius:9,border:"1.5px solid "+(progNuevoTipo===opt[0]?"#8DC63F":"#e2e8f0"),
                                background:progNuevoTipo===opt[0]?"#eef6d5":"#fff",
                                color:progNuevoTipo===opt[0]?"#3d6b10":"#64748b",
                                fontWeight:700,fontSize:12,cursor:"pointer"}}>
                              {opt[1]}
                            </button>
                          );
                        })}
                      </div>

                      {/* Fecha o día del mes */}
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:4}}>
                          {progNuevoTipo==="fecha"?"FECHA ESPECÍFICA":"DÍA DEL MES (1-31)"}
                        </div>
                        {progNuevoTipo==="fecha"
                          ? <input type="date" value={progNuevaFecha} onChange={function(e){setProgNuevaFecha(e.target.value);}} style={inp3}/>
                          : <input type="number" min="1" max="31" value={progNuevoDia} onChange={function(e){setProgNuevoDia(e.target.value);}} style={Object.assign({},inp3,{width:80})} placeholder="15"/>
                        }
                      </div>

                      {/* Nota opcional */}
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:4}}>NOTA (opcional)</div>
                        <input value={progNuevaNota} onChange={function(e){setProgNuevaNota(e.target.value);}} placeholder="Ej: Informe mensual de transportadoras" style={Object.assign({},inp3,{width:"100%",boxSizing:"border-box"})}/>
                      </div>

                      {/* Roles */}
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>ROLES QUE VEN ESTA TAREA</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                          {rolesDisponibles.map(function(r){
                            var activo = progNuevosRoles.indexOf(r) >= 0;
                            var c = coloresRoles[r] || {};
                            return (
                              <button key={r} onClick={function(){toggleRolP(r);}}
                                style={{padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:11,cursor:"pointer",
                                  border:"1.5px solid "+(activo?(c.dot||"#8DC63F"):"#e2e8f0"),
                                  background:activo?(c.bg||"#eef6d5"):"transparent",
                                  color:activo?(c.text||"#3d6b10"):"#94a3b8"}}>
                                {activo?"✓ ":""}{r}
                              </button>
                            );
                          })}
                        </div>
                      </div>

                      {/* Tareas */}
                      <div style={{marginBottom:14}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>TAREAS A AGREGAR ({progNuevasTareas.length} seleccionadas)</div>
                        <input
                          placeholder="🔍 Buscar tarea..."
                          value={progBusqueda}
                          onChange={function(e){setProgBusqueda(e.target.value);}}
                          style={{width:"100%",padding:"7px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:12,color:"#1e293b",background:"#fff",outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:6}}
                        />
                        <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,padding:"4px 0"}}>
                          {listaTareas.filter(function(t){
                            if (!progBusqueda.trim()) return true;
                            var q = progBusqueda.toLowerCase();
                            return (t.nombre||"").toLowerCase().indexOf(q)>=0 || (t.code||"").toLowerCase().indexOf(q)>=0;
                          }).map(function(t){
                            var activo = progNuevasTareas.indexOf(t.code) >= 0;
                            return (
                              <div key={t.code} onClick={function(){toggleTareaP(t.code);}}
                                style={{padding:"7px 10px",borderRadius:9,cursor:"pointer",display:"flex",alignItems:"center",gap:8,
                                  background:activo?"#eef6d5":"#fff",
                                  border:"1.5px solid "+(activo?"#8DC63F":"#e2e8f0")}}>
                                <div style={{width:16,height:16,borderRadius:4,border:"2px solid "+(activo?"#8DC63F":"#e2e8f0"),
                                  background:activo?"#8DC63F":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                  {activo && <span style={{fontSize:10,color:"#fff",fontWeight:900}}>✓</span>}
                                </div>
                                <span style={{fontSize:11,color:"#94a3b8",minWidth:36,fontWeight:700}}>{t.code}</span>
                                <span style={{fontSize:12,color:"#1e293b",fontWeight:activo?700:400}}>{t.nombre}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      <button onClick={agregarProg}
                        disabled={progNuevasTareas.length===0||progNuevosRoles.length===0}
                        style={{width:"100%",padding:12,borderRadius:11,border:"none",fontWeight:700,fontSize:14,cursor:"pointer",
                          background:(progNuevasTareas.length>0&&progNuevosRoles.length>0)?"linear-gradient(135deg,#8DC63F,#5a8a1f)":"#e2e8f0",
                          color:(progNuevasTareas.length>0&&progNuevosRoles.length>0)?"#fff":"#94a3b8"}}>
                        Guardar tarea programada
                      </button>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ── Panel Grupos ── */}
          {pantallaActiva === "grupos" && (
            <div>
              <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:16}}>
                Asigna roles a cada grupo. Cada grupo solo verá las tareas que tienen su prefijo de código.
                Puedes cambiar el prefijo de cualquier tarea en <b>Tareas base</b>.
              </p>

              {/* Info prefijos */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {[
                  {prefix:"A0", label:"Vendedores", emoji:"💼", bg:"#eef6d5", border:"#d4edaa", text:"#3d6b10", desc:"A001–A099"},

      var metricas = props.metricas || [];

      var onSave = props.onSave;
      var guardado = props.saved;

      var [editandoCode, setEditandoCode] = useState(null);
      var [textoEdicion, setTextoEdicion] = useState("");
      var [confirmarEliminar, setConfirmarEliminar] = useState(null);
      var [nuevaMet, setNuevaMet] = useState({code:"", nombre:""});

      var rolesDisponibles = getRoleKeys(config);
      var coloresRoles = getRoleColors(config);

      function toggleRolMetrica(code, rol) {
        setMetricas(function(lista) {
          return lista.map(function(m) {
            if (m.code !== code) return m;
            var rls = Array.isArray(m.roles) ? m.roles : rolesDisponibles.slice();
            var nuevosRoles = rls.indexOf(rol) >= 0
              ? rls.filter(function(r) { return r !== rol; })
              : rls.concat([rol]);
            return Object.assign({}, m, {roles: nuevosRoles});
          });
        });
      }

      function empezarEdicion(m) { setEditandoCode(m.code); setTextoEdicion(m.nombre); }
      function confirmarEdicion(code) {
        if (!textoEdicion.trim()) return;
        setMetricas(function(lista) {
          return lista.map(function(m) { return m.code===code ? Object.assign({},m,{nombre:textoEdicion.trim()}) : m; });
        });
        setEditandoCode(null);
      }
      function eliminarMetrica(code) {
        setMetricas(function(lista) { return lista.filter(function(m) { return m.code !== code; }); });
        setConfirmarEliminar(null);

        if (!nuevaMet.code.trim() || !nuevaMet.nombre.trim()) return;
        setMetricas(function(lista) { return lista.concat([{code:nuevaMet.code.trim(), nombre:nuevaMet.nombre.trim(), roles:rolesDisponibles.slice()}]); });

                      />
                    ) : (
                      <span style={{flex:1,fontSize:13,fontWeight:600,color:"#1e293b"}}>{m.nombre}</span>
                    )}
                    <div style={{display:"flex",gap:4}}>
                      {esteEditando ? (
                        <>
                          <button onClick={function(){confirmarEdicion(m.code);}}
                            style={{padding:"4px 12px",borderRadius:7,border:"none",background:"#8DC63F",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>✓ Guardar</button>
                          <button onClick={function(){setEditandoCode(null);}}
                            style={{padding:"4px 10px",borderRadius:7,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>Cancelar</button>
                        </>

                        <>

                          <button onClick={function(){setConfirmarEliminar(m.code);setEditandoCode(null);}}
                            style={{padding:"4px 9px",borderRadius:7,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:11,cursor:"pointer"}}>✕</button>
                        </>
                      )}
                    </div>
                  </div>
                  {!esteEditando && (
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {rolesDisponibles.map(function(r){
                        var activo = rolesMetrica.indexOf(r) >= 0;
                        var c = coloresRoles[r] || {};
                        return (
                          <button key={r} onClick={function(){toggleRolMetrica(m.code,r);}}
                            style={{padding:"2px 9px",borderRadius:20,fontWeight:700,fontSize:10,cursor:"pointer",
                              border:"1.5px solid "+(activo?(c.dot||"#8DC63F"):"#e2e8f0"),
                              background:activo?(c.bg||"#eef6d5"):"transparent",
                              color:activo?(c.text||"#3d6b10"):"#94a3b8"}}>{r}</button>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {confirmarEliminar && (
            <div style={{marginBottom:14,padding:"16px",borderRadius:14,border:"2px solid #fca5a5",background:"#fef2f2"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#991b1b",marginBottom:6}}>¿Eliminar esta métrica?</div>
              <div style={{fontSize:13,color:"#b91c1c",marginBottom:14}}>

              </div>

                  Cancelar
                </button>
              </div>
            </div>
          )}

          <div style={{padding:"14px 16px",borderRadius:12,border:"2px dashed #e2e8f0",background:"#f8fafc",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:10}}>+ NUEVA MÉTRICA</div>
            <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8}}>
              <input placeholder="Código" value={nuevaMet.code}
                onChange={function(e){setNuevaMet(function(x){return Object.assign({},x,{code:e.target.value});});}}
                style={inp2}/>
              <input placeholder="Nombre" value={nuevaMet.nombre}

            </button>
          </div>

          <button onClick={function(){onSave();}}
            style={{width:"100%",padding:12,borderRadius:11,border:"none",fontWeight:700,fontSize:14,cursor:"pointer",
