        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // EXPORTAR XLSX
    // ═══════════════════════════════════════════════════
    function buildXLSX(sheets) {
      // Encode string to UTF-8 bytes
      function toUTF8(str) {
        var s = unescape(encodeURIComponent(str));
        var a = new Uint8Array(s.length);
        for (var i = 0; i < s.length; i++) a[i] = s.charCodeAt(i);
        return a;
      }
      function esc(v) {
        return String(v===null||v===undefined?"":v)
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
      }
      function colName(n) {
        var s=""; n++;
        while(n>0){var r=(n-1)%26;s=String.fromCharCode(65+r)+s;n=Math.floor((n-1)/26);}
        return s;
      }
      function crc32(buf) {
        var c, table=[];
        for(var n=0;n<256;n++){c=n;for(var k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;table[n]=c;}
        var crc=0xFFFFFFFF;
        for(var i=0;i<buf.length;i++)crc=table[(crc^buf[i])&0xFF]^(crc>>>8);
        return (crc^0xFFFFFFFF)>>>0;
      }
      function u16LE(n){return[(n)&0xFF,(n>>8)&0xFF];}
      function u32LE(n){return[(n)&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}

      // Build shared strings
      var ssMap={}, ssList=[];
      function ss(v) {
        var s=String(v===null||v===undefined?"":v);
        if(ssMap[s]===undefined){ssMap[s]=ssList.length;ssList.push(s);}
        return ssMap[s];
      }

      // Build worksheet XMLs (pre-register all strings first)
      var wsXMLs = sheets.map(function(sh){
        var rows=[sh.headers].concat(sh.rows);
        var xml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
          +'<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
          +' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
          +'<sheetData>';
        rows.forEach(function(row,ri){
          xml+='<row r="'+(ri+1)+'">';
          (row||[]).forEach(function(v,ci){
            var ref=colName(ci)+(ri+1);
            var sv=String(v===null||v===undefined?"":v);
            var isNum=sv!==""&&!isNaN(parseFloat(sv))&&isFinite(sv)&&sv.indexOf("%")<0&&sv.indexOf("/")<0&&sv.indexOf(":")<0;
            if(isNum){
              xml+='<c r="'+ref+'"><v>'+parseFloat(sv)+'</v></c>';
            } else {
              var idx=ss(sv);
              xml+='<c r="'+ref+'" t="s"><v>'+idx+'</v></c>';
            }
          });
          xml+='</row>';
        });
        xml+='</sheetData></worksheet>';
        return xml;
      });

      // Shared strings XML
      var ssXML='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
        +'<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
        +' count="'+ssList.length+'" uniqueCount="'+ssList.length+'">';
      ssList.forEach(function(s){ssXML+='<si><t xml:space="preserve">'+esc(s)+'</t></si>';});
      ssXML+='</sst>';

      // Workbook XML
      var wbXML='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
        +'<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
        +' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
        +'<sheets>';
      sheets.forEach(function(sh,i){
        wbXML+='<sheet name="'+esc(sh.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>';
      });
      wbXML+='</sheets></workbook>';

      // Relationships
      var wbRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
        +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';
      sheets.forEach(function(sh,i){
        wbRels+='<Relationship Id="rId'+(i+1)+'"'
          +' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet"'
          +' Target="worksheets/sheet'+(i+1)+'.xml"/>';
      });
      wbRels+='<Relationship Id="rId'+(sheets.length+1)+'"'
        +' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings"'
        +' Target="sharedStrings.xml"/></Relationships>';

      var appRels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
        +'<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
        +'<Relationship Id="rId1"'
        +' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument"'
        +' Target="xl/workbook.xml"/>'
        +'</Relationships>';

      // Content types
      var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
        +'<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
        +'<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
        +'<Default Extension="xml" ContentType="application/xml"/>'
        +'<Override PartName="/xl/workbook.xml"'
        +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
        +'<Override PartName="/xl/sharedStrings.xml"'
        +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>';
      sheets.forEach(function(sh,i){
        ct+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml"'
          +' ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
      });
      ct+='</Types>';

      // Assemble ZIP entries
      var entries=[];
      function addEntry(name, data) {
        var nd = typeof data==="string" ? toUTF8(data) : data;
        var nn = toUTF8(name);
        var crc = crc32(nd);
        // Local file header
        var lhBytes = [0x50,0x4B,0x03,0x04] // signature
          .concat(u16LE(20))   // version needed
          .concat(u16LE(0))    // flags
          .concat(u16LE(0))    // compression: stored
          .concat(u16LE(0))    // mod time
          .concat(u16LE(0))    // mod date
          .concat(u32LE(crc))
          .concat(u32LE(nd.length))
          .concat(u32LE(nd.length))
          .concat(u16LE(nn.length))
          .concat(u16LE(0));   // extra field length
        var lh = new Uint8Array(lhBytes.length + nn.length + nd.length);
        var lhArr = new Uint8Array(lhBytes);
        lh.set(lhArr, 0);
        lh.set(nn, lhBytes.length);
        lh.set(nd, lhBytes.length + nn.length);
        entries.push({name:nn, crc:crc, size:nd.length, local:lh});
      }

      addEntry("[Content_Types].xml", ct);
      addEntry("_rels/.rels", appRels);
      addEntry("xl/workbook.xml", wbXML);
      addEntry("xl/_rels/workbook.xml.rels", wbRels);
      addEntry("xl/sharedStrings.xml", ssXML);
      wsXMLs.forEach(function(xml,i){ addEntry("xl/worksheets/sheet"+(i+1)+".xml", xml); });

      // Calculate total size
      var dataSize = entries.reduce(function(s,e){return s+e.local.length;},0);
      var cdSize = entries.length * 46 + entries.reduce(function(s,e){return s+e.name.length;},0);
      var total = dataSize + cdSize + 22;
      var out = new Uint8Array(total);
      var pos = 0;
      var offsets = [];

      // Write local entries
      entries.forEach(function(e){
        offsets.push(pos);
        out.set(e.local, pos);
        pos += e.local.length;
      });

      // Write central directory
      var cdStart = pos;
      entries.forEach(function(e,i){
        var cdBytes = [0x50,0x4B,0x01,0x02]
          .concat(u16LE(20))   // version made by
          .concat(u16LE(20))   // version needed
          .concat(u16LE(0))    // flags
          .concat(u16LE(0))    // compression
          .concat(u16LE(0))    // mod time
          .concat(u16LE(0))    // mod date
          .concat(u32LE(e.crc))
          .concat(u32LE(e.size))
          .concat(u32LE(e.size))
          .concat(u16LE(e.name.length))
          .concat(u16LE(0))    // extra
          .concat(u16LE(0))    // comment
          .concat(u16LE(0))    // disk start
          .concat(u16LE(0))    // internal attr
          .concat(u32LE(0))    // external attr
          .concat(u32LE(offsets[i]));
        var cdArr = new Uint8Array(cdBytes);
        out.set(cdArr, pos); pos += cdArr.length;
        out.set(e.name, pos); pos += e.name.length;
      });

      // End of central directory
      var eocd = [0x50,0x4B,0x05,0x06]
        .concat(u16LE(0))
        .concat(u16LE(0))
        .concat(u16LE(entries.length))
        .concat(u16LE(entries.length))
        .concat(u32LE(pos - cdStart))
        .concat(u32LE(cdStart))
        .concat(u16LE(0));
      out.set(new Uint8Array(eocd), pos);
      return out;
    }

    // ═══════════════════════════════════════════════════
    // ADMIN TAB: EXPORTAR
    // ═══════════════════════════════════════════════════
    function ExportarAdminTab(props) {
      var entries = props.entries || {};
      var config = props.config || {};
      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;
      var hoy = today();
      var [desde, setDesde] = useState(hoy.slice(0,7)+"-01");
      var [hasta, setHasta] = useState(hoy);
      var [filtroAsesora, setFiltroAsesora] = useState("Todas");
      var [exportando, setExportando] = useState(false);
      var sel = {padding:"8px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,background:"#f8fafc",color:"#1e293b",cursor:"pointer",fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box"};
      var metricasDef = config.metricas || METRICAS_BASE;
      var tareasDef = config.tareas || TAREAS_BASE;

      var lista = Object.values(entries).filter(function(e){
        var matchA = filtroAsesora==="Todas" || e.asesora===filtroAsesora;
        return matchA && e.fecha>=desde && e.fecha<=hasta && !e.enProgreso;
      }).sort(function(a,b){return b.fecha.localeCompare(a.fecha);});

      function exportar() {
        if (lista.length===0||exportando) return;
        setExportando(true);
        setTimeout(function(){
          try {
            var h1=["Fecha","Asesora","Turno","% Tareas","Meta COP","Ventas COP","% Meta","Puntualidad","Notas","Guardado en"].concat(metricasDef.map(function(m){return m.nombre;}));
            var r1=lista.map(function(e){
              var metaE=getMetaEfectiva(config,e.fecha,e.rol);
              var tareasFil=tareasDef.filter(function(t){return(t.roles||[]).indexOf(e.rol||"")>=0;});
              var si=tareasFil.filter(function(t){return e.checks&&e.checks[t.code]==="Si";}).length;
              var pctT=tareasFil.length?Math.round(si/tareasFil.length*100)+"%":"";
              var pctV=metaE&&e.ventas&&Number(e.ventas)>0?Math.round(Number(e.ventas)/metaE*100)+"%":"";
              var punt=e.checks&&e.checks["A001"]?(e.checks["A001"]==="Si"?"A tiempo":e.checks["A001"]==="Tarde"?"Tarde":"No asistio"):"";
              return[e.fecha,e.asesora,e.rol||"",pctT,metaE||"",e.ventas||"",pctV,punt,e.notas||"",e.savedAt?e.savedAt.slice(0,16).replace("T"," "):""].concat(metricasDef.map(function(m){return(e.metricas&&e.metricas[m.code]!==undefined)?e.metricas[m.code]:"";})  );
            });
            var h2=["Fecha","Asesora","Turno"].concat(metricasDef.map(function(m){return m.nombre;}));
            var r2=lista.map(function(e){return[e.fecha,e.asesora,e.rol||""].concat(metricasDef.map(function(m){return(e.metricas&&e.metricas[m.code]!==undefined)?e.metricas[m.code]:"";  }));});
            var h3=["Fecha","Asesora","Turno","% Tareas"].concat(tareasDef.map(function(t){return t.nombre;}));
            var r3=lista.map(function(e){
              var tareasFil=tareasDef.filter(function(t){return(t.roles||[]).indexOf(e.rol||"")>=0;});
              var si=tareasFil.filter(function(t){return e.checks&&e.checks[t.code]==="Si";}).length;
              var pctT=tareasFil.length?Math.round(si/tareasFil.length*100)+"%":"";
              return[e.fecha,e.asesora,e.rol||"",pctT].concat(tareasDef.map(function(t){if((t.roles||[]).indexOf(e.rol||"")<0)return"N/A";return e.checks?(e.checks[t.code]||"Sin marcar"):"Sin marcar";}));
            });
            var asistData=config.asistencia||{};
            var h4=["Fecha","Asesora","Turno","Hora Entrada","Hora Salida","Puntualidad","Hora Esperada"];
            var r4=[];
            Object.keys(asistData).sort().reverse().forEach(function(fd){
              if(fd<desde||fd>hasta)return;
              Object.keys(asistData[fd]).forEach(function(ak){
                var reg=asistData[fd][ak];if(!reg)return;
                var an=reg.asesora||ak;
                if(filtroAsesora!=="Todas"&&an!==filtroAsesora)return;
                r4.push([fd,an,reg.rol||"",reg.entrada||"",reg.salida||"",reg.puntualidad||"",reg.horaEsperada||""]);
              });
            });
            if(r4.length===0)r4.push(["Sin registros en el periodo","","","","","",""]);
            var xlsxData=buildXLSX([{name:"Bitacora",headers:h1,rows:r1},{name:"Metricas",headers:h2,rows:r2},{name:"Tareas",headers:h3,rows:r3},{name:"Asistencia",headers:h4,rows:r4}]);
            var blob=new Blob([xlsxData],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
            var url=URL.createObjectURL(blob);var a=document.createElement("a");
            a.href=url;a.download="tribu_bitacora_"+desde+"_"+hasta+".xlsx";a.click();URL.revokeObjectURL(url);
          } catch(err){console.error("Export error:",err);alert("Error al exportar: "+err.message);}
          setExportando(false);
        },100);
      }

      return (
        <div>
          <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:16}}>
            Exporta los registros a un <b>Excel real (.xlsx)</b> con 4 hojas: Bitacora, Metricas, Tareas y Asistencia.
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>DESDE</label>
                <input type="date" value={desde} onChange={function(e){setDesde(e.target.value);}} style={sel}/>
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>HASTA</label>
                <input type="date" value={hasta} onChange={function(e){setHasta(e.target.value);}} style={sel}/>
              </div>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:4}}>ASESORA</label>
              <select value={filtroAsesora} onChange={function(e){setFiltroAsesora(e.target.value);}} style={sel}>
                <option value="Todas">Todas las asesoras</option>
                {ASESORAS.map(function(a){return <option key={a} value={a}>{a}</option>;})}
              </select>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["mes","Este mes"],["7d","7 dias"],["30d","30 dias"]].map(function(item){
                return <button key={item[0]} onClick={function(){
                  if(item[0]==="mes"){setDesde(hoy.slice(0,7)+"-01");setHasta(hoy);return;}
                  var d=new Date();d.setDate(d.getDate()-(item[0]==="7d"?6:29));
                  var off=d.getTimezoneOffset();var loc=new Date(d.getTime()-off*60000);
                  setDesde(loc.toISOString().slice(0,10));setHasta(hoy);
                }} style={{padding:"6px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#475569",fontWeight:700,fontSize:11,cursor:"pointer"}}>{item[1]}</button>;
              })}
            </div>
          </div>
          <div style={{padding:"12px 16px",borderRadius:12,background:"#f8fafc",border:"1px solid #e2e8f0",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:"#475569"}}><b style={{color:"#1a2e0a"}}>{lista.length}</b> registros encontrados</span>
            <span style={{fontSize:11,color:"#94a3b8"}}>{desde} al {hasta}</span>
          </div>
          <button onClick={exportar} disabled={lista.length===0||exportando}
            style={{width:"100%",padding:13,borderRadius:12,border:"none",fontWeight:700,fontSize:14,
              cursor:(lista.length>0&&!exportando)?"pointer":"default",
              background:(lista.length>0&&!exportando)?"linear-gradient(135deg,#8DC63F,#5a8a1f)":"#e2e8f0",
              color:(lista.length>0&&!exportando)?"#fff":"#94a3b8"}}>
            {exportando?"Generando Excel...":lista.length>0?"Descargar Excel ("+lista.length+" registros)":"Sin registros en el periodo"}
          </button>
          <div style={{marginTop:10,fontSize:11,color:"#94a3b8",textAlign:"center"}}>
            Archivo .xlsx compatible con Excel y Google Sheets. 4 hojas incluidas.
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // ADMIN TAB: HORARIOS
    // ═══════════════════════════════════════════════════
    function HorariosTab(props) {
      var config = props.config;
      var onSave = props.onSave;
      var saved = props.saved;
      var rolesDisponibles = getRoleKeys(config);
      var [horarios, setHorarios] = useState(function(){
        return (config.horarios && config.horarios.length > 0) ? config.horarios : HORARIOS_DEFAULT.map(function(h){return Object.assign({},h);});
      });
      var inp2 = {padding:"8px 10px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",background:"#f8fafc",outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
      var [confirmarEliminarH, setConfirmarEliminarH] = useState(null);

      function updateH(i, field, val) {
        setHorarios(function(hs){ return hs.map(function(h,j){ return j===i?Object.assign({},h,(function(){var o={};o[field]=val;return o;})()  ):h; }); });
      }
      function toggleRolH(i, rol) {
        setHorarios(function(hs){ return hs.map(function(h,j){
          if(j!==i)return h;
          var roles=(h.roles||[]).slice();
          var idx=roles.indexOf(rol);
          if(idx>=0)roles.splice(idx,1); else roles.push(rol);
          return Object.assign({},h,{roles:roles});
        }); });
      }
      function addHorario() { setHorarios(function(hs){ return hs.concat([{nombre:"Nuevo turno",entrada:"08:00",salida:"17:00",roles:[]}]); }); }
      function removeHorario(i) { setHorarios(function(hs){ return hs.filter(function(_,j){return j!==i;}); }); setConfirmarEliminarH(null); }

      return (
        <div>
          <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:16}}>
            Define horarios de entrada y salida por turno. Hay <b>{GRACIA_MINUTOS} minutos</b> de gracia para marcar puntual.
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
            {horarios.map(function(h, i){
              return (
                <div key={i} style={{padding:"14px 16px",borderRadius:14,border:"1.5px solid #e2e8f0",background:"#f8fafc"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <input value={h.nombre} onChange={function(e){updateH(i,"nombre",e.target.value);}} style={Object.assign({},inp2,{fontWeight:700,fontSize:14})}/>
                    {confirmarEliminarH === i ? (
                      <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                        <span style={{fontSize:11,color:"#ef4444",fontWeight:700,whiteSpace:"nowrap"}}>Eliminar?</span>
                        <button onClick={function(){removeHorario(i);}} style={{padding:"4px 10px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer"}}>Si</button>
                        <button onClick={function(){setConfirmarEliminarH(null);}} style={{padding:"4px 10px",borderRadius:7,border:"1.5px solid #e2e8f0",background:"#fff",color:"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>No</button>
                      </div>
                    ) : (
                      <button onClick={function(){setConfirmarEliminarH(i);}} style={{padding:"5px 10px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>X</button>
                    )}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:4}}>ENTRADA</div>
                      <input type="time" value={h.entrada||"08:00"} onChange={function(e){updateH(i,"entrada",e.target.value);}} style={inp2}/>
                    </div>
                    <div>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:4}}>SALIDA</div>
                      <input type="time" value={h.salida||"17:00"} onChange={function(e){updateH(i,"salida",e.target.value);}} style={inp2}/>
                    </div>
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6}}>ROLES</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {rolesDisponibles.map(function(r){
                      var activo=(h.roles||[]).indexOf(r)>=0;
                      var c=ROLE_COLORS[r]||{};
                      return (
                        <button key={r} onClick={function(){toggleRolH(i,r);}}
                          style={{padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:11,cursor:"pointer",
                            border:"1.5px solid "+(activo?(c.dot||"#8DC63F"):"#e2e8f0"),
                            background:activo?(c.bg||"#eef6d5"):"transparent",
                            color:activo?(c.text||"#3d6b10"):"#94a3b8"}}>
                          {r}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={addHorario} style={{width:"100%",padding:"10px 0",borderRadius:10,border:"2px dashed #e2e8f0",background:"transparent",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:12}}>
            + Agregar horario
          </button>
          <button onClick={function(){onSave(horarios);}} style={{width:"100%",padding:12,borderRadius:11,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
            {saved?"Guardado":"Guardar horarios"}
          </button>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // ADMIN VIEW (panel principal)
    // ═══════════════════════════════════════════════════
    function AdminView(props) {
      var config = props.config;
      var entries = props.entries || {};
      var onConfigChange = props.onConfigChange;
      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;

      var [tab, setTab] = useState("turnos");
      var [saved, setSaved] = useState(false);
      var [tareas, setTareas] = useState(function(){return config.tareas || TAREAS_BASE;});
      var [newTarea, setNewTarea] = useState({code:"",nombre:"",roles:[]});
      var [metricas2, setMetricas2] = useState(function(){return config.metricas || METRICAS_BASE;});
      var [newMet, setNewMet] = useState({code:"",nombre:""});
      var [overrides, setOverrides] = useState(function(){return config.overrides || {};});
      var [asesoras, setAsesoras] = useState(function(){return ASESORAS;});
      var [newAsesora, setNewAsesora] = useState("");
      var [confirmarEliminar, setConfirmarEliminar] = useState(null);
      var [novedades, setNovedades] = useState(function(){return config.novedades || {};});
      var [passwords, setPasswords] = useState(function(){return config.passwords || {};});

      function flash() { setSaved(true); setTimeout(function(){setSaved(false);},2000); }
      function saveMetas(newMetas) { onConfigChange(Object.assign({},config,{metas:newMetas})); flash(); }
      function saveTareas() { onConfigChange(Object.assign({},config,{tareas:tareas})); flash(); }
      function saveMetricas() { onConfigChange(Object.assign({},config,{metricas:metricas2})); flash(); }
      function saveTurnos(newOverrides) { setOverrides(newOverrides); onConfigChange(Object.assign({},config,{overrides:newOverrides})); flash(); }
      function saveAsesoras() { onConfigChange(Object.assign({},config,{asesoras:asesoras})); flash(); }
      function saveNovedades(updated, detalles) { setNovedades(updated); var nc=Object.assign({},config,{novedades:updated}); if(detalles)nc.novedadesDetalle=detalles; onConfigChange(nc); flash(); }
      function savePasswords(updated) { setPasswords(updated); onConfigChange(Object.assign({},config,{passwords:updated})); flash(); }

      function addTarea() { if(!newTarea.code||!newTarea.nombre||!(newTarea.roles||[]).length)return; setTareas(function(t){return t.concat([Object.assign({},newTarea)]);});setNewTarea({code:"",nombre:"",roles:[]});}
      function removeTarea(code) { setTareas(function(t){return t.filter(function(x){return x.code!==code;});});}
      function toggleTareaRol(code,rol) { setTareas(function(ts){return ts.map(function(t){var rls=t.roles||[];return t.code===code?Object.assign({},t,{roles:rls.indexOf(rol)>=0?rls.filter(function(r){return r!==rol;}):[...rls,rol]}):t;});});}
      function addMetrica() { if(!newMet.code||!newMet.nombre)return;setMetricas2(function(m){return m.concat([Object.assign({},newMet)]);});setNewMet({code:"",nombre:""});}
      function removeMetrica(code) { setMetricas2(function(m){return m.filter(function(x){return x.code!==code;});});}
      function addAsesora() { var name=newAsesora.trim();if(!name||asesoras.indexOf(name)>=0)return;setAsesoras(function(a){return a.concat([name]);});setNewAsesora("");}
      function removeAsesora(name) { if(asesoras.length<=1)return; setConfirmarEliminar(name); }
      function confirmarEliminarFn() { var name=confirmarEliminar; setAsesoras(function(a){return a.filter(function(x){return x!==name;});}); setConfirmarEliminar(null); }

      var tabBtn = function(id,lbl){return <button onClick={function(){setTab(id);}} style={{padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,background:tab===id?"#8DC63F":"transparent",color:tab===id?"#fff":"#64748b",fontFamily:"inherit",whiteSpace:"nowrap"}}>{lbl}</button>;};
      var inp2 = {padding:"9px 12px",borderRadius:9,border:"1.5px solid #e2e8f0",fontSize:13,color:"#1e293b",background:"#f8fafc",outline:"none",fontFamily:"inherit"};

      return (
        <div style={{maxWidth:720,margin:"0 auto",padding:"0 16px"}}>
          <div style={{marginBottom:20,textAlign:"center"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#1a2e0a",margin:0}}>Panel de Administración</h2>
            <p style={{color:"#64748b",fontSize:13,marginTop:4}}>Configura el equipo, metas, tareas y metricas</p>
          </div>
          <div style={{background:"#fff",borderRadius:20,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
            <div style={{padding:"12px 16px",borderBottom:"1px solid #f1f5f9",display:"flex",gap:4,background:"#f8fafc",flexWrap:"wrap"}}>
              {tabBtn("turnos","Turnos")}
              {tabBtn("metas","Metas")}
              {tabBtn("tareas","Tareas")}
              {tabBtn("metricas","Metricas")}
              {tabBtn("asesoras","Asesoras")}
              {tabBtn("novedades","Novedades")}
              {tabBtn("contraseñas","Contraseñas")}
              {tabBtn("roles","Roles")}
              {tabBtn("horarios","Horarios")}
              {tabBtn("exportar","Exportar")}
            </div>
            <div style={{padding:24}}>
              {tab === "turnos" && <TurnosTab overrides={overrides} setOverrides={setOverrides} onSave={saveTurnos} saved={saved} asesoras={asesoras} config={config}/>}
              {tab === "metas" && <MetasTab config={config} onSave={saveMetas} onConfigChange={onConfigChange} saved={saved}/>}
              {tab === "tareas" && <TareasAdminTab tareas={tareas} setTareas={setTareas} config={config} onSave={saveTareas} onConfigChange={onConfigChange} saved={saved}/>}
              {tab === "metricas" && <MetricasAdminTab metricas={metricas2} setMetricas={setMetricas2} config={config} onSave={saveMetricas} saved={saved}/>}
              {tab === "asesoras" && (
                <div>
                  <p style={{fontSize:13,color:"#64748b",marginTop:0,marginBottom:14}}>Agrega o elimina asesoras del equipo.</p>
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
                    {asesoras.map(function(a,i){
                      var rolAsignado = (config.rolesAsesoras && config.rolesAsesoras[a]) || "";
                      return (
                        <div key={a} style={{borderRadius:11,border:"1px solid #e2e8f0",background:"#f8fafc",overflow:"hidden"}}>
                          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px"}}>
                            <div style={{width:32,height:32,borderRadius:9,background:AVATAR_BG[i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(a)}</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{a}</div>
                              {rolAsignado && <div style={{fontSize:11,color:"#3d6b10",marginTop:2}}>{rolAsignado}</div>}
                            </div>
                            <select value={rolAsignado} onChange={function(e){
                              var nuevosRoles = Object.assign({}, config.rolesAsesoras||{});
                              if (e.target.value) nuevosRoles[a] = e.target.value;
                              else delete nuevosRoles[a];
                              onConfigChange(Object.assign({},config,{rolesAsesoras:nuevosRoles}));
                            }} style={{padding:"5px 8px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:12,color:"#1e293b",background:"#fff",cursor:"pointer",fontFamily:"inherit",maxWidth:140}}>
                              <option value="">Sin rol fijo</option>
                              {getRoleKeys(config).map(function(r){return <option key={r} value={r}>{r}</option>;})}
                            </select>
                            {asesoras.length > 1 && <button onClick={function(){removeAsesora(a);}} style={{padding:"5px 12px",borderRadius:8,border:"none",background:"#fef2f2",color:"#ef4444",fontWeight:700,fontSize:12,cursor:"pointer"}}>Eliminar</button>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {confirmarEliminar && (
                    <div style={{padding:"20px",borderRadius:14,border:"2px solid #fca5a5",background:"#fef2f2",marginBottom:14}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
                        <div style={{width:44,height:44,borderRadius:12,background:AVATAR_BG[asesoras.indexOf(confirmarEliminar)%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#fff",fontWeight:800,flexShrink:0}}>{initials(confirmarEliminar)}</div>
                        <div>
                          <div style={{fontSize:14,fontWeight:800,color:"#991b1b"}}>Eliminar asesora</div>
                          <div style={{fontSize:13,color:"#b91c1c",marginTop:2}}>¿Estás seguro de que quieres eliminar a <b>{confirmarEliminar}</b>?</div>
                        </div>
                      </div>
                      <div style={{fontSize:12,color:"#b91c1c",background:"#fee2e2",borderRadius:9,padding:"9px 12px",marginBottom:14}}>
                        Esta acción no se puede deshacer. Se eliminará la asesora del equipo pero sus registros de bitácora se conservarán.
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={confirmarEliminarFn} style={{flex:1,padding:"11px 0",borderRadius:10,border:"none",background:"#ef4444",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                          Sí, eliminar
                        </button>
                        <button onClick={function(){setConfirmarEliminar(null);}} style={{flex:1,padding:"11px 0",borderRadius:10,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",fontWeight:700,fontSize:14,cursor:"pointer"}}>
                          Cancelar
                        </button>
                      </div>
                    </div>
                  )}
                  <div style={{padding:"14px 16px",borderRadius:12,border:"2px dashed #e2e8f0",background:"#f8fafc",marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:10}}>+ NUEVA ASESORA</div>
                    <div style={{display:"flex",gap:8}}>
                      <input placeholder="Nombre completo" value={newAsesora} onChange={function(e){setNewAsesora(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")addAsesora();}} style={Object.assign({},inp2,{flex:1})}/>
                      <button onClick={addAsesora} style={{padding:"9px 18px",borderRadius:9,border:"none",background:"#8DC63F",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Agregar</button>
                    </div>
                  </div>
                  <button onClick={saveAsesoras} style={{width:"100%",padding:12,borderRadius:11,border:"none",background:saved?"#10b981":"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"Guardado":"Guardar cambios"}</button>
                </div>
              )}
              {tab === "novedades" && <NovedadesTab config={config} novedades={novedades} setNovedades={setNovedades} onSave={saveNovedades} saved={saved}/>}
              {tab === "contraseñas" && <ContrasenasTab config={config} passwords={passwords} onSave={savePasswords} saved={saved}/>}
              {tab === "roles" && <RolesTab config={config} onSave={function(r){onConfigChange(Object.assign({},config,{customRoles:r}));flash();}} saved={saved}/>}
              {tab === "horarios" && <HorariosTab config={config} onSave={function(h){onConfigChange(Object.assign({},config,{horarios:h}));flash();}} saved={saved}/>}
              {tab === "exportar" && <ExportarAdminTab entries={entries} config={config}/>}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // ADMIN LOCK (pantalla de contraseña)
    // ═══════════════════════════════════════════════════
    var ADMIN_PASSWORD_DEFAULT = "admin123";
    function AdminLock(props) {
      var onUnlock = props.onUnlock;
      var adminPwd = props.adminPwd || ADMIN_PASSWORD_DEFAULT;
      var [pwd, setPwd] = useState("");
      var [error, setError] = useState(false);
      function check() {
        if (pwd === adminPwd) { onUnlock(); setError(false); }
        else { setError(true); setPwd(""); setTimeout(function(){setError(false);},2000); }
      }
      return (
        <div style={{maxWidth:360,margin:"60px auto",padding:"0 16px"}}>
          <div style={{background:"#fff",borderRadius:20,padding:36,border:"1px solid #e2e8f0",boxShadow:"0 8px 32px rgba(0,0,0,0.08)",textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔐</div>
            <h2 style={{fontSize:18,fontWeight:800,color:"#1a2e0a",margin:"0 0 6px"}}>Panel de Administración</h2>
            <p style={{fontSize:13,color:"#64748b",marginBottom:24}}>Acceso restringido.</p>
            <input type="password" value={pwd} onChange={function(e){setPwd(e.target.value);setError(false);}} onKeyDown={function(e){if(e.key==="Enter")check();}} placeholder="Contraseña" autoFocus style={{width:"100%",padding:"12px 16px",borderRadius:11,border:"2px solid "+(error?"#ef4444":"#e2e8f0"),fontSize:15,color:"#1e293b",background:error?"#fef2f2":"#f8fafc",outline:"none",boxSizing:"border-box",fontFamily:"inherit",textAlign:"center",letterSpacing:4}}/>
            {error && <p style={{color:"#ef4444",fontSize:12,fontWeight:700,margin:"8px 0 0"}}>Contraseña incorrecta</p>}
            <button onClick={check} style={{marginTop:16,width:"100%",padding:13,borderRadius:11,border:"none",background:"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Ingresar</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // APP (componente raíz)
    // ═══════════════════════════════════════════════════
    function App() {
      var [view, setView] = useState("form");
      var [entries, setEntries] = useState({});
      var [config, setConfig] = useState({tareas:TAREAS_BASE,metricas:METRICAS_BASE,metas:{default:{}}});
      var [sheetsStatus, setSheetsStatus] = useState(null);
      var [adminUnlocked, setAdminUnlocked] = useState(false);
      var [asesoraLogin, setAsesoraLogin] = useState(null);
      // password check state
      var [pwdAsesora, setPwdAsesora] = useState(null); // asesora esperando pwd
      var [pwdInput, setPwdInput] = useState("");
      var [pwdError, setPwdError] = useState(false);

      var [fbReady, setFbReady] = useState(false);

      useEffect(function(){
        var timeout = setTimeout(function(){
          // Si en 8 segundos no conecta, cargar igual con datos vacíos
          setFbReady(true);
        }, 8000);

        // Escuchar entries en tiempo real desde Firebase
        var refEntries = db.ref("bitacora_entries");
        refEntries.on("value", function(snap){
          var val = snap.val();
          if (val) setEntries(val);
          else setEntries({});
        }, function(err){ console.error("Firebase entries error:", err); });

        // Escuchar config en tiempo real desde Firebase
        var refConfig = db.ref("bitacora_config");
        refConfig.on("value", function(snap){
          var val = snap.val();
          if (val) setConfig(val);
          clearTimeout(timeout);
          setFbReady(true);
        }, function(err){
          console.error("Firebase config error:", err);
          clearTimeout(timeout);
          setFbReady(true);
        });

        // Escuchar asistencia en tiempo real
        var refAsistencia = db.ref("bitacora_asistencia");
        refAsistencia.on("value", function(snap){
          var val = snap.val();
          setConfig(function(prev){ return Object.assign({}, prev, {asistencia: val || {}}); });
        });

        return function(){
          clearTimeout(timeout);
          refEntries.off();
          refConfig.off();
          refAsistencia.off();
        };
      }, []);

      var ASESORAS = config.asesoras || ASESORAS_DEFAULT;

      // Pantalla de carga mientras Firebase conecta
      if (!fbReady) {
        return (
          <div style={{minHeight:"100vh",background:"#f5f4f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
            <div style={{width:48,height:48,borderRadius:12,background:"#8DC63F",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:"#fff"}}>TR</div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:15,fontWeight:700,color:"#3d6b10",marginBottom:6}}>Conectando...</div>
              <div style={{fontSize:13,color:"#94a3b8"}}>Sincronizando datos con Firebase</div>
            </div>
            <div style={{width:36,height:36,border:"4px solid #d4edaa",borderTopColor:"#8DC63F",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}></div>
          </div>
        );
      }

      function seleccionarAsesora(a) {
        var passwords = config.passwords || {};
        if (passwords[a]) {
          setPwdAsesora(a); setPwdInput(""); setPwdError(false);
        } else {
          setAsesoraLogin(a);
        }
      }
      function verificarPwd() {
        var passwords = config.passwords || {};
        if (pwdInput === passwords[pwdAsesora]) {
          setAsesoraLogin(pwdAsesora); setPwdAsesora(null); setPwdInput(""); setPwdError(false);
        } else {
          setPwdError(true); setPwdInput(""); setTimeout(function(){setPwdError(false);}, 2000);
        }
      }

      // Login screen
      if (!asesoraLogin && view === "form") {
        // Password modal
        if (pwdAsesora) {
          var ai = ASESORAS.indexOf(pwdAsesora);
          return (
            <div style={{minHeight:"100vh",background:"#f5f4f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"#fff",borderRadius:24,padding:"36px 32px",border:"1px solid #e2e8f0",boxShadow:"0 8px 32px rgba(0,0,0,0.1)",maxWidth:340,width:"100%",textAlign:"center"}}>
                <div style={{width:64,height:64,borderRadius:18,background:AVATAR_BG[ai>=0?ai%AVATAR_BG.length:0],display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,color:"#fff",fontWeight:800,margin:"0 auto 12px"}}>{initials(pwdAsesora)}</div>
                <h3 style={{fontSize:18,fontWeight:800,color:"#1a2e0a",margin:"0 0 4px"}}>{pwdAsesora}</h3>
                <p style={{fontSize:13,color:"#64748b",margin:"0 0 20px"}}>Ingresa tu contraseña para continuar</p>
                <input
                  type="password"
                  value={pwdInput}
                  onChange={function(e){setPwdInput(e.target.value);setPwdError(false);}}
                  onKeyDown={function(e){if(e.key==="Enter")verificarPwd();}}
                  placeholder="Contraseña..."
                  autoFocus
                  style={{width:"100%",padding:"12px 16px",borderRadius:11,border:"2px solid "+(pwdError?"#ef4444":"#e2e8f0"),fontSize:16,color:"#1e293b",background:pwdError?"#fef2f2":"#f8fafc",outline:"none",boxSizing:"border-box",fontFamily:"inherit",textAlign:"center",letterSpacing:4,marginBottom:8}}
                />
                {pwdError && <p style={{color:"#ef4444",fontSize:12,fontWeight:700,margin:"0 0 8px"}}>Contraseña incorrecta</p>}
                <button onClick={verificarPwd} style={{width:"100%",padding:13,borderRadius:11,border:"none",background:"linear-gradient(135deg,#8DC63F,#5a8a1f)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>
                  Entrar
                </button>
                <button onClick={function(){setPwdAsesora(null);setPwdInput("");setPwdError(false);}} style={{width:"100%",padding:10,borderRadius:11,border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  Volver
                </button>
              </div>
            </div>
          );
        }

        return (
          <div style={{minHeight:"100vh",background:"#f5f4f0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{marginBottom:32,textAlign:"center"}}>
              <div style={{display:"inline-flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:48,height:48,borderRadius:12,background:"#8DC63F",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:"#fff"}}>TR</div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontWeight:900,fontSize:22,color:"#3d6b10",lineHeight:1}}>TRIBU</div>
                  <div style={{fontWeight:500,fontSize:12,color:"#94a3b8",letterSpacing:"0.08em"}}>NATURAL PETS</div>
                </div>
              </div>
              <h2 style={{fontSize:18,fontWeight:800,color:"#1a2e0a",margin:"8px 0 4px"}}>Bitácora de Ventas</h2>
              <p style={{color:"#64748b",fontSize:14,margin:0}}>¿Quién eres hoy?</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,width:"100%",maxWidth:480}}>
              {ASESORAS.map(function(a,i){
                var mesKeyLogin = today().slice(0,7);
                var novCount = config.novedades && config.novedades[mesKeyLogin] && config.novedades[mesKeyLogin][a] ? config.novedades[mesKeyLogin][a] : 0;
                var rolHoyLogin = getTurnosDelDia(today(), config.overrides||{}, config)[a];
                var tienePwd = !!(config.passwords && config.passwords[a]);
                return (
                  <button key={a} onClick={function(){seleccionarAsesora(a);}} style={{padding:"20px 16px",borderRadius:16,border:"2px solid #e2e8f0",background:"#fff",cursor:"pointer",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",position:"relative"}}>
                    {novCount > 0 && <div style={{position:"absolute",top:10,right:10,background:"#ef4444",color:"#fff",borderRadius:20,fontSize:10,fontWeight:800,padding:"1px 7px"}}>{novCount}</div>}
                    {tienePwd && <div style={{position:"absolute",top:10,left:10,fontSize:12}}>🔒</div>}
                    <div style={{width:52,height:52,borderRadius:14,background:AVATAR_BG[i%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#fff",fontWeight:800,margin:"0 auto 10px"}}>{initials(a)}</div>
                    <div style={{fontWeight:700,fontSize:14,color:"#1e293b"}}>{a.split(" ")[0]}</div>
                    <div style={{fontSize:12,color:"#94a3b8"}}>{a.split(" ").slice(1).join(" ")}</div>
                    {rolHoyLogin && <div style={{marginTop:6}}><RolBadge rol={rolHoyLogin}/></div>}
                    {!rolHoyLogin && <div style={{fontSize:10,color:"#94a3b8",marginTop:6,fontStyle:"italic"}}>Día libre</div>}
                  </button>
                );
              })}
            </div>
            <button onClick={function(){setView("admin");}} style={{marginTop:24,padding:"10px 24px",borderRadius:10,border:"1.5px solid #d4edaa",background:"#eef6d5",color:"#3d6b10",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              Admin
            </button>
          </div>
        );
      }

      async function handleSave(entry, deleteKey) {
        if (entry === null && deleteKey) {
          // Borrar entrada: usar slash en lugar de __
          var fbKey = deleteKey.replace("__", "/");
          try { await db.ref("bitacora_entries/" + deleteKey).remove(); } catch(e){}
          return;
        }
        var key = entry.asesora + "__" + entry.fecha;
        // Guardar en Firebase (se propaga a todos los dispositivos en tiempo real)
        try {
          await db.ref("bitacora_entries/" + key).set(entry);
        } catch(e) {
          console.error("Firebase write error:", e);
        }
        // Enviar a Sheets SOLO al guardar final (no en autoguardado)
        if (SHEETS_URL && !entry.enProgreso) {
          setSheetsStatus("sending");
          var result = await enviarASheets(entry, config);
          setSheetsStatus(result.ok ? "ok" : "error");
          setTimeout(function(){setSheetsStatus(null);}, 4000);
        }
      }

      function handleConfigChange(newConfig) {
        setConfig(newConfig);
        // Guardar config en Firebase (se propaga a todos los dispositivos)
        try { db.ref("bitacora_config").set(newConfig); } catch(e){}
      }

      var pendientes = ASESORAS.filter(function(a){
        var r = getRolForDate(a, today(), config.overrides||{}, config);
        return r && !entries[a+"__"+today()];
      }).length;

      return (
        <div style={{minHeight:"100vh",background:"#f5f4f0",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
          <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",display:"flex",alignItems:"center",gap:10,height:54,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginRight:"auto"}}>
              <div style={{width:32,height:32,borderRadius:8,background:"#8DC63F",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff"}}>TR</div>
              <div>
                <div style={{fontWeight:900,fontSize:13,color:"#3d6b10",lineHeight:1}}>TRIBU</div>
                <div style={{fontWeight:500,fontSize:10,color:"#94a3b8",lineHeight:1}}>BITÁCORA</div>
              </div>
            </div>

            {sheetsStatus && (
              <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700,background:sheetsStatus==="ok"?"#f0fdf4":sheetsStatus==="error"?"#fef2f2":"#f0f9ff",color:sheetsStatus==="ok"?"#15803d":sheetsStatus==="error"?"#dc2626":"#0369a1",border:"1px solid "+(sheetsStatus==="ok"?"#bbf7d0":sheetsStatus==="error"?"#fecaca":"#bae6fd")}}>
                {sheetsStatus==="sending"&&"Enviando..."}
                {sheetsStatus==="ok"&&"Guardado en Sheets"}
                {sheetsStatus==="error"&&"Error al enviar"}
                {sheetsStatus==="no_url"&&"Sin URL configurada"}
              </div>
            )}

            <nav style={{display:"flex",gap:2}}>
              {view !== "form" && (
                <button onClick={function(){setView("form");setAsesoraLogin(null);}} style={{padding:"8px 16px",borderRadius:9,border:"none",cursor:"pointer",background:"transparent",color:"#64748b",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>Registrar</button>
              )}
              {view === "form" && asesoraLogin && (
                <button onClick={function(){setAsesoraLogin(null);}} style={{padding:"8px 14px",borderRadius:9,border:"1.5px solid #e2e8f0",cursor:"pointer",background:"#fff",color:"#64748b",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
                  <div style={{width:22,height:22,borderRadius:6,background:AVATAR_BG[ASESORAS.indexOf(asesoraLogin)%AVATAR_BG.length],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:800}}>{initials(asesoraLogin)}</div>
                  {asesoraLogin.split(" ")[0]} cambiar
                </button>
              )}
              {adminUnlocked && (
                <button onClick={function(){setView("dashboard");}} style={{padding:"8px 16px",borderRadius:9,border:"none",cursor:"pointer",background:view==="dashboard"?"linear-gradient(135deg,#8DC63F,#5a8a1f)":"transparent",color:view==="dashboard"?"#fff":"#64748b",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>
                  Dashboard {pendientes>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:20,fontSize:10,fontWeight:800,padding:"1px 7px",marginLeft:4}}>{pendientes}</span>}
                </button>
              )}
              <button onClick={function(){setView("admin");}} style={{padding:"8px 16px",borderRadius:9,border:"none",cursor:"pointer",background:view==="admin"?"linear-gradient(135deg,#8DC63F,#5a8a1f)":"transparent",color:view==="admin"?"#fff":"#64748b",fontWeight:700,fontSize:13,fontFamily:"inherit"}}>Admin</button>
            </nav>
          </div>

          <div style={{padding:"28px 16px 60px"}}>
            {view === "form" && <FormView onSave={handleSave} existingData={entries} config={config} defaultAsesora={asesoraLogin} isAdmin={adminUnlocked}/>}
            {view === "dashboard" && <DashboardView entries={entries} config={config}/>}
            {view === "admin" && (!adminUnlocked ? <AdminLock onUnlock={function(){setAdminUnlocked(true);}} adminPwd={(config.passwords && config.passwords["__admin__"]) || ADMIN_PASSWORD_DEFAULT}/> : <AdminView config={config} entries={entries} onConfigChange={handleConfigChange}/>)}
          </div>
        </div>
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
